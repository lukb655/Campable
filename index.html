/* ---------------- PIN PICKER ---------------- */
function PinPicker({startLat,startLng,title,onPick,onClose}){
  const ref=useRef(null); const [sel,setSel]=useState(null);
  useEffect(()=>{
    if(!ref.current) return;
    const center=(startLat&&startLng)?[+startLat,+startLng]:[39.0476,-79.3074];
    const map=L.map(ref.current,{attributionControl:false}).setView(center,11);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:18}).addTo(map);
    let marker=(startLat&&startLng)?L.marker(center).addTo(map):null;
    if(marker) setSel({lat:+startLat,lng:+startLng});
    map.on("click",e=>{ setSel(e.latlng); if(marker)marker.setLatLng(e.latlng); else marker=L.marker(e.latlng).addTo(map); });
    setTimeout(()=>map.invalidateSize(),120);
    return ()=>map.remove();
  },[]);
  return (
    <Modal title={title} onClose={onClose} wide>
      <p style={{...St.sub,marginTop:0}}>Tap the map to set the spot.</p>
      <div ref={ref} style={St.mapPick}/>
      <div style={St.modalActions}>
        <button style={St.ghostBtn} onClick={onClose}>Cancel</button>
        <button style={St.primaryBtn} disabled={!sel} onClick={()=>sel&&onPick(sel.lat,sel.lng)}><Ic.check style={ic(15)}/> Use this spot</button>
      </div>
    </Modal>
  );
}

/* ---------------- PROFILE ---------------- */
function Profile({me,mode,photo,onPhotoChange,onBack,onSignOut,onDeleted,flash}){
  const [showPrivacy,setShowPrivacy]=useState(false);
  const [delConfirm,setDelConfirm]=useState(false);
  const [delBusy,setDelBusy]=useState(false);
  const [delErr,setDelErr]=useState("");
  const [photoBusy,setPhotoBusy]=useState(false);

  const handlePhoto=async(file)=>{
    if(!file)return; setPhotoBusy(true);
    try{ const d=await fileToCompressedDataURL(file,800,0.75); onPhotoChange(d); flash("Profile photo updated"); }
    catch(e){ flash(e.message||"Couldn't load photo"); }
    setPhotoBusy(false);
  };

  const deleteAccount=async()=>{
    setDelBusy(true); setDelErr("");
    try{ await Data.deleteAccount(me.id); onDeleted(); }
    catch(e){ setDelErr(e.message||"Couldn't delete account."); setDelBusy(false); }
  };

  return (
    <div className="fade">
      <button style={St.backBtn} onClick={onBack}><Ic.back style={ic(16)}/> Back</button>
      <h1 style={St.h1}>Account</h1>

      {/* Identity */}
      <div style={St.block}>
        <div style={St.blockHead}><span>Profile</span></div>
        <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:14}}>
          <div style={{position:"relative",flexShrink:0}}>
            {photo
              ?<img src={photo} alt="" style={{width:60,height:60,borderRadius:16,objectFit:"cover",display:"block"}}/>
              :<div style={{...St.avatar,width:60,height:60,borderRadius:16,fontSize:24}}>{me.name.slice(0,1).toUpperCase()}</div>}
            <label style={{position:"absolute",bottom:-4,right:-4,background:"var(--ember)",borderRadius:8,
              width:24,height:24,display:"grid",placeItems:"center",cursor:"pointer",border:"2px solid var(--night)"}}>
              {photoBusy?<Ic.tent style={{...ic(12),color:"var(--night)"}} className="spin"/>:<Ic.img style={{...ic(12),color:"var(--night)"}}/>}
              <input type="file" accept="image/*" style={{display:"none"}} disabled={photoBusy}
                onChange={e=>{handlePhoto(e.target.files[0]);e.target.value="";}}/>
            </label>
          </div>
          <div>
            <div style={St.itemTitle}>{me.name}</div>
            <div style={St.itemMeta}>{me.email||"local account"}</div>
          </div>
        </div>
        <button style={{...St.dangerBtn}} onClick={onSignOut}><Ic.logout style={ic(15)}/> Sign out</button>
      </div>

      {/* Sync */}
      <div style={St.block}>
        <div style={St.blockHead}><span>Sync status</span>
          <span style={{...St.modeBadge,background:mode==="live"?"rgba(91,191,138,.15)":"rgba(232,178,60,.15)",
            color:mode==="live"?"#7FD8A8":"var(--gold)"}}>
            {mode==="live"?<Ic.cloud style={ic(13)}/>:<Ic.phone style={ic(13)}/>}
            {mode==="live"?"Live":"Local · this device only"}
          </span>
        </div>
        <p style={{...St.sub,marginTop:4}}>
          {mode==="live"
            ?"Your account and trips sync across all your devices."
            :"Add Firebase keys (setup guide) to sync across phones."}
        </p>
      </div>

      {/* Install */}
      <div style={St.block}>
        <div style={St.blockHead}><span>Add to Home Screen</span></div>
        <ol style={St.ol}>
          <li>Open in <b>Safari</b>.</li>
          <li>Tap the <b>Share</b> button.</li>
          <li>Choose <b>Add to Home Screen</b>.</li>
        </ol>
      </div>

      {/* Legal */}
      <div style={St.block}>
        <div style={St.blockHead}><span>Legal</span></div>
        <button style={St.linkBtn} onClick={()=>setShowPrivacy(true)}>Privacy Policy</button>
      </div>

      {/* Delete account */}
      <div style={St.block}>
        <div style={St.blockHead}><span>Danger zone</span></div>
        {!delConfirm
          ?<button style={St.dangerBtn} onClick={()=>setDelConfirm(true)}><Ic.trash style={ic(15)}/> Delete account</button>
          :<div>
            <p style={{...St.sub,marginTop:0,marginBottom:12,color:"#E78A87"}}>
              This permanently deletes your account and removes you from all trips. If you own any trips, they will be deleted too. This cannot be undone.
            </p>
            {delErr&&<div style={St.errText}>{delErr}</div>}
            <div style={{display:"flex",gap:10}}>
              <button style={St.ghostBtn} onClick={()=>{setDelConfirm(false);setDelErr("");}}>Cancel</button>
              <button style={{...St.dangerBtn,background:"rgba(217,83,79,.15)"}} disabled={delBusy} onClick={deleteAccount}>
                {delBusy?<Ic.tent style={ic(15)} className="spin"/>:<><Ic.trash style={ic(15)}/> Yes, delete everything</>}
              </button>
            </div>
          </div>}
      </div>

      {showPrivacy&&<PrivacyPolicy onClose={()=>setShowPrivacy(false)}/>}
    </div>
  );
}

        When you use the app you may add photos, campsite coordinates, meal plans, and emergency contact details

        <p><b>Cookies & local storage</b><br/>
        The app uses browser localStorage only for session management (keeping you logged in).
        No third-party cookies are used.</p>

        <p><b>Contact</b><br/>

      </div>
      <div style={St.modalActions}>

  );
}

/* ============================================================
   SHARED PIECES
   ============================================================ */
function ImagePicker({label,current,onPicked,onClear,flash}){
  const [busy,setBusy]=useState(false);
  const handle=async(file)=>{
    if(!file)return; setBusy(true);
    try{ const d=await fileToCompressedDataURL(file); onPicked(d); }
    catch(e){ flash&&flash(e.message||"Couldn't load that image"); }
    setBusy(false);
  };
  return (
    <div style={St.block}>
      <div style={St.blockHead}><span>{label}</span><Ic.img style={{...ic(13),color:"var(--sage)"}}/></div>
      {current &&
        <div style={{position:"relative",marginBottom:10}}>
          <img src={current} alt="" style={St.coverPreview}/>
          <button style={St.photoDel} onClick={onClear} aria-label="Remove"><Ic.x style={ic(13)}/></button>
        </div>}
      <label style={{...St.smallBtn,display:"inline-flex",cursor:"pointer",opacity:busy?.6:1}}>
        {busy ? <><Ic.tent style={ic(14)} className="spin"/> Working…</> : <><Ic.img style={ic(14)}/> {current?"Replace photo":"Choose photo"}</>}
        <input type="file" accept="image/*" style={{display:"none"}} disabled={busy}
          onChange={e=>{handle(e.target.files[0]);e.target.value="";}}/>
      </label>
      <div style={St.hintSm}>JPG, PNG, WEBP, or GIF · max 15 MB. Photos are resized automatically. HEIC (iPhone default) must be exported as JPEG first.</div>
    </div>
  );
}

function ShareCard({trip,flash}){
  const copy=async()=>{try{await navigator.clipboard.writeText(trip.code);flash("Code copied");}catch{flash(trip.code);}};
  const share=async()=>{
    const text=`Join "${trip.name}" on Campable. Open the app, tap Join, and enter code: ${trip.code}`;

  };
  return (
    <div style={St.shareCard}>
      <div>
        <div style={St.shareLabel}>Crew invite code</div>

        <button style={St.iconChip} onClick={copy} aria-label="Copy"><Ic.copy style={ic(16)}/></button>

function WidgetPicker({trip,current,onSave,onClose}){
  const [sel,setSel]=useState([...current]);
  const toggle=(id)=>setSel(prev=>prev.includes(id)?prev.filter(x=>x!==id):prev.length<4?[...prev,id]:prev);
  const ready=sel.length===4;
  return (
    <Modal title="Edit Widgets" onClose={onClose}>
      <div style={{color:"var(--sage)",fontSize:12.5,marginBottom:14}}>Choose 4 widgets to display on your overview. ({sel.length}/4 selected)</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
        {WIDGET_DEFS.map(w=>{
          const on=sel.includes(w.id);
          return (
            <button key={w.id} onClick={()=>toggle(w.id)}
              style={{...St.statCard,cursor:"pointer",border:on?"1px solid var(--ember)":"1px solid var(--line)",
                background:on?"rgba(232,104,44,0.1)":"var(--pine)",padding:"12px 10px"}}>
              <w.icon style={{...ic(16),color:on?"var(--ember2)":"var(--sage)"}}/>
              <div style={{...St.statValue,fontSize:20,color:on?"var(--paper)":"var(--sage)"}}>{w.get(trip)}</div>
              <div style={{...St.statLabel,color:on?"var(--ember2)":"var(--sage)"}}>{w.label}</div>
            </button>
          );
        })}
      </div>
      <div style={St.modalActions}>
        <button style={St.ghostBtn} onClick={onClose}>Cancel</button>
        <button style={{...St.primaryBtn,...(!ready?{opacity:.45,cursor:"not-allowed"}:{})}}
          disabled={!ready} onClick={()=>{onSave(sel);onClose();}}>
          <Ic.check style={ic(15)}/> Save Widgets
        </button>
      </div>
    </Modal>
  );
}

function WidgetGrid({trip,isAdmin,patch}){

function JoinForm({onJoin,onClose}){
  const [c,setC]=useState(""); const [err,setErr]=useState(""); const [busy,setBusy]=useState(false);
  const go=async()=>{
    if(c.length<6||busy) return;
    setBusy(true); setErr("");
    try{
      const ok=await onJoin(c);
      if(!ok) setErr("No trip found with that code — double-check with your crew.");
    }catch(e){
      const msg=e.code==="permission-denied"
        ?"Permission denied — check Firebase rules allow authenticated users to query trips by code."
        :e.message||"Couldn't join. Check your connection and try again.";
      setErr(msg);
    }
    setBusy(false);
  };
  return (
    <Modal title="Join a trip" onClose={onClose}>
      <p style={{...St.sub,marginTop:0}}>Enter the 6-character code from whoever planned it.</p>
      <input style={{...St.input,textAlign:"center",fontFamily:"'Oswald',sans-serif",fontSize:24,letterSpacing:6,textTransform:"uppercase"}}
        maxLength={6} autoFocus value={c} placeholder="ABC123"
        onChange={e=>{setC(e.target.value.toUpperCase());setErr("");}} onKeyDown={e=>e.key==="Enter"&&go()}/>
      {err && <div style={St.errText}>{err}</div>}
      {!HAS_FB && <div style={{...St.hintSm,marginTop:8}}>⚠ Join only works across devices in Firebase mode — local mode is single-device only.</div>}
      <div style={St.modalActions}>
        <button style={St.ghostBtn} onClick={onClose}>Cancel</button>
        <button style={St.primaryBtn} disabled={c.length<6||busy} onClick={go}>
          {busy?<Ic.tent style={ic(15)} className="spin"/>:"Join trip"}
        </button>
      </div>
    </Modal>
  );
}

function FormSheet({title,fields,onSave,onClose,initial={}}){
  const init={}; fields.forEach(f=>{init[f.k]=initial[f.k]!=null?initial[f.k]:(f.def!=null?f.def:(f.type==="bool"?false:""));});
  const [v,setV]=useState(init);
  const submit=()=>{const bad=fields.find(f=>f.req&&!String(v[f.k]).trim());if(bad)return;onSave(v);};
  return (
    <Modal title={title} onClose={onClose}>
      {fields.map(f=>(
        <Field key={f.k} label={f.label}>
          {(f.type==="text"||f.type==="number") &&
            <input style={St.input} type={f.type==="number"?"number":"text"} value={v[f.k]} onChange={e=>setV({...v,[f.k]:e.target.value})}/>}
          {f.type==="select" &&
            <select style={St.input} value={v[f.k]} onChange={e=>setV({...v,[f.k]:e.target.value})}>
              {f.allowEmpty && <option value="">—</option>}
              {f.opts.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
            </select>}
          {f.type==="bool" &&
            <button style={{...St.toggle,...(v[f.k]?St.toggleOn:{})}} onClick={()=>setV({...v,[f.k]:!v[f.k]})}>
              <span style={{...St.toggleKnob,...(v[f.k]?St.toggleKnobOn:{})}}/>{v[f.k]?"Yes":"No"}</button>}
        </Field>
      ))}
      <div style={St.modalActions}>
        <button style={St.ghostBtn} onClick={onClose}>Cancel</button>
        <button style={St.primaryBtn} onClick={submit}><Ic.check style={ic(15)}/> Save</button>
      </div>
    </Modal>
  );
}

  checkBtn:{width:24,height:24,borderRadius:7,border:"1.5px solid var(--mist)",background:"none",cursor:"pointer",display:"grid",placeItems:"center",flexShrink:0},
  checkOn:{background:"var(--ember)",borderColor:"var(--ember)"},
  navBtn:{width:34,height:34,borderRadius:9,background:"var(--moss)",display:"grid",placeItems:"center",color:"var(--sage)",textDecoration:"none",flexShrink:0},
  netPill:{fontSize:12,fontWeight:600,padding:"5px 10px",borderRadius:8,whiteSpace:"nowrap"},
  dirBtn:{display:"inline-flex",alignItems:"center",gap:6,background:"var(--moss)",color:"var(--paper)",border:"1px solid var(--line)",borderRadius:10,padding:"9px 13px",fontSize:13,fontWeight:600,textDecoration:"none"},

  // member cards
  memberCard:{background:"var(--pine)",border:"1px solid var(--line)",borderRadius:14,padding:14},
  memberAvatarImg:{width:38,height:38,borderRadius:10,objectFit:"cover",flexShrink:0},
  memberMeta:{fontSize:12,color:"var(--sage)",margin:"8px 0 2px"},
  memberRow:{display:"flex",alignItems:"center",gap:8,marginTop:8,fontSize:13},
  youTag:{fontSize:10,background:"var(--moss)",color:"var(--sage)",padding:"1px 6px",borderRadius:6,marginLeft:6,fontWeight:600,verticalAlign:"middle"},
  inlineInput:{flex:1,background:"var(--night)",border:"1px solid var(--line)",borderRadius:8,color:"var(--paper)",padding:"7px 10px",fontSize:13},
  uploadChip:{display:"inline-flex",alignItems:"center",gap:4,background:"var(--moss)",color:"var(--paper)",borderRadius:8,padding:"5px 10px",fontSize:12,fontWeight:600,cursor:"pointer"},
  photoStrip:{display:"flex",gap:8,overflowX:"auto",marginTop:8,paddingBottom:4},
  photoThumb:{position:"relative",flexShrink:0},
  photoImg:{width:72,height:72,borderRadius:10,objectFit:"cover",display:"block"},
  photoDel:{position:"absolute",top:4,right:4,width:20,height:20,borderRadius:6,background:"rgba(15,26,23,.8)",border:"none",color:"var(--paper)",display:"grid",placeItems:"center",cursor:"pointer"},
  coverPreview:{width:"100%",height:140,objectFit:"cover",borderRadius:10,display:"block"},

  // meals
  mealCard:{background:"var(--pine)",border:"1px solid var(--line)",borderRadius:14,padding:14},
  expandRow:{display:"flex",alignItems:"center",gap:7,width:"100%",background:"var(--night)",border:"1px solid var(--line)",borderRadius:10,padding:"9px 12px",color:"var(--sage)",fontSize:12.5,cursor:"pointer",marginTop:10},
  itemsBox:{marginTop:10,display:"grid",gap:6},
  shopRow:{display:"flex",alignItems:"center",gap:10},
  shopMeal:{fontSize:11,color:"var(--sage)",background:"var(--moss)",padding:"2px 8px",borderRadius:6},
  shopBringer:{fontSize:11,color:"var(--gold)",background:"rgba(232,178,60,.12)",padding:"2px 8px",borderRadius:6,whiteSpace:"nowrap"},
  itemRespSelect:{background:"var(--moss)",border:"1px solid var(--line)",borderRadius:7,color:"var(--paper)",fontSize:11,padding:"3px 6px",cursor:"pointer",maxWidth:76},

  empty:{display:"flex",flexDirection:"column",alignItems:"center",gap:10,textAlign:"center",color:"var(--sage)",fontSize:13,padding:"28px 20px",border:"1px dashed var(--line)",borderRadius:14,marginBottom:14,lineHeight:1.5},
  mapBig:{height:300,borderRadius:12,overflow:"hidden",border:"1px solid var(--line)"},
  mapPick:{height:360,borderRadius:12,overflow:"hidden",border:"1px solid var(--line)",marginBottom:14},

  primaryBtn:{display:"inline-flex",alignItems:"center",gap:6,background:"var(--ember)",color:"var(--night)",border:"none",borderRadius:11,padding:"10px 16px",fontSize:14,fontWeight:600,cursor:"pointer"},
  ghostBtn:{background:"none",border:"1px solid var(--line)",color:"var(--sage)",borderRadius:11,padding:"10px 16px",fontSize:14,cursor:"pointer",fontWeight:500},
  smallBtn:{display:"inline-flex",alignItems:"center",gap:5,background:"var(--moss)",color:"var(--paper)",border:"none",borderRadius:10,padding:"9px 13px",fontSize:13,fontWeight:600,cursor:"pointer"},
  dangerBtn:{display:"inline-flex",alignItems:"center",gap:6,background:"none",border:"1px solid rgba(217,83,79,.4)",color:"#E78A87",borderRadius:11,padding:"10px 16px",fontSize:13.5,fontWeight:600,cursor:"pointer"},
  iconBtn:{background:"none",border:"none",color:"var(--mist)",cursor:"pointer",display:"grid",placeItems:"center",padding:4},

  overlay:{position:"fixed",inset:0,background:"rgba(8,14,12,.72)",backdropFilter:"blur(3px)",display:"grid",placeItems:"center",zIndex:9999,padding:18},
  modal:{width:"100%",maxWidth:440,background:"var(--pine)",border:"1px solid var(--line)",borderRadius:18,padding:20,maxHeight:"90vh",overflowY:"auto"},
  modalHead:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16},
  modalTitle:{fontFamily:"'Oswald',sans-serif",fontSize:20,fontWeight:600,letterSpacing:.5},
  modalActions:{display:"flex",gap:10,justifyContent:"flex-end",marginTop:6},
  fieldLabel:{fontSize:12,color:"var(--sage)",marginBottom:6,fontWeight:500},
  input:{width:"100%",background:"var(--night)",border:"1px solid var(--line)",borderRadius:10,color:"var(--paper)",padding:"10px 12px",fontSize:14},
  toggle:{display:"inline-flex",alignItems:"center",gap:8,background:"var(--night)",border:"1px solid var(--line)",borderRadius:10,padding:"8px 12px",color:"var(--sage)",cursor:"pointer",fontSize:13,fontWeight:600},
  toggleOn:{color:"var(--paper)"},
  toggleKnob:{width:16,height:16,borderRadius:5,background:"var(--mist)",transition:"all .2s"},
  toggleKnobOn:{background:"var(--ember)"},

  modeBadge:{display:"inline-flex",alignItems:"center",gap:5,fontSize:11.5,fontWeight:600,padding:"4px 9px",borderRadius:8},
  ol:{margin:"4px 0 0",paddingLeft:18,color:"var(--paper)",fontSize:13.5,lineHeight:1.7},
  errText:{color:"#E78A87",fontSize:12.5,marginTop:4,marginBottom:4},

  // Gallery
  galleryGrid:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5,marginTop:4},

  toast:{position:"fixed",bottom:"calc(env(safe-area-inset-bottom) + 90px)",left:"50%",transform:"translateX(-50%)",
    background:"var(--pine)",border:"1px solid var(--ember)",borderRadius:12,padding:"11px 18px",fontSize:13.5,fontWeight:600,
    display:"flex",alignItems:"center",gap:8,zIndex:60,boxShadow:"0 8px 30px rgba(0,0,0,.4)"},
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
