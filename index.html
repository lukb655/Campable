<!-- Firebase config is loaded at runtime from /api/config — never hardcoded here. -->

<script>
  Babel.registerPreset("react-classic", {

<script type="text/babel" data-presets="react-classic">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ============================================================
   DATA LAYER — Firebase (email/password + Firestore) if config
   loads from /api/config, else a local-device fallback.
   ============================================================ */
let HAS_FB = false;
let db = null, auth = null;
let _fbInitDone = false;

// Fetch config once at startup — resolves before Auth.init runs
const _configReady = fetch('/api/config')
  .then(r => { if (!r.ok) throw new Error('config ' + r.status); return r.json(); })
  .then(cfg => { window.FIREBASE_CONFIG = cfg; })
  .catch(e => {
    console.warn('Config fetch failed — local mode only.', e.message);
    window.FIREBASE_CONFIG = {};
  });

function _initFirebase() {
  if (_fbInitDone) return;
  _fbInitDone = true;
  try {
    const cfg = window.FIREBASE_CONFIG || {};
    if (cfg.projectId && typeof firebase !== "undefined" && !window._FB_LOAD_ERR) {
      if (!firebase.apps.length) firebase.initializeApp(cfg);
      db   = firebase.firestore();
      auth = firebase.auth();
      auth.setPersistence("local").catch(() => {});
      HAS_FB = true;
    }
  } catch(e) {
    console.warn("Firebase init failed — local mode.", e.message);
    db = null; auth = null; HAS_FB = false;
  }
}

const uid=()=>Math.random().toString(36).slice(2,10);
const code6=()=>{const a="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";return Array.from({length:6},()=>a[Math.floor(Math.random()*a.length)]).join("");};

/* ---------- local fallback (account-based, stored on device) ---------- */
const LK={users:"campable:users",session:"campable:session",trips:"campable:trips"};
function lread(k,d){try{return JSON.parse(localStorage.getItem(k))??d;}catch{return d;}}
function lwrite(k,v){localStorage.setItem(k,JSON.stringify(v));}
const localSubs=new Set();
function localPing(){const all=lread(LK.trips,{});localSubs.forEach(fn=>fn(all));}
const fieldNoteSubs=new Map();
function pingFieldNotes(tripId){
  const key=`campable:fieldNotes:${tripId}`;
  const notes=lread(key,[]).sort((a,b)=>b.createdAt-a.createdAt);
  (fieldNoteSubs.get(tripId)||new Set()).forEach(fn=>fn(notes));
}

/* simple non-cryptographic hash for the LOCAL fallback only.
   (Real security comes from Firebase Auth when configured.) */
function weakHash(s){let h=5381;for(let i=0;i<s.length;i++)h=((h<<5)+h+s.charCodeAt(i))|0;return String(h);}

const Auth = {
  current:null,
  async init(onUser){
    // Wait for /api/config to load, then initialise Firebase once
    try { await _configReady; } catch {}
    _initFirebase();
    if(HAS_FB){
      // Safety net: if Firebase auth doesn't respond within 8 seconds,
      // fall back to treating the user as logged out rather than hanging.
      let resolved = false;
      const timeout = setTimeout(() => {
        if (!resolved) {
          resolved = true;
          console.warn("Firebase auth timed out — showing login screen.");
          onUser(null);
        }
      }, 8000);
      auth.onAuthStateChanged(async u => {
        if (!resolved) { resolved = true; clearTimeout(timeout); }
        try {
          // If Firebase returns a user with no email, it's a leftover anonymous
          // session from an older version of this app. Sign it out and show login.
          if (u && !u.email) {
            await auth.signOut();
            this.current = null;
            onUser(null);
            return;
          }
          this.current = u ? {id:u.uid, email:u.email||"", name:(u.displayName||(u.email?u.email.split("@")[0]:"Camper"))} : null;
          onUser(this.current);
        } catch(e) {
          console.warn("Auth state parse error:", e.message);
          this.current = null;
          onUser(null);
        }
      });
      return;
    }
    // Local fallback — synchronous, never hangs.
    // Require both a valid session ID and a user record with a real name.
    const s=lread(LK.session,null);
    const users=lread(LK.users,{});
    const found = s && users[s] && users[s].name && users[s].email ? users[s] : null;
    this.current = found ? {id:s, email:found.email, name:found.name} : null;
    onUser(this.current);
  },
  async signUp(email,password,name){
    if(HAS_FB){
      const cred=await auth.createUserWithEmailAndPassword(email.trim(),password);
      await cred.user.updateProfile({displayName:name});
      this.current={id:cred.user.uid,email:email.trim(),name};
      return this.current;
    }
    const users=lread(LK.users,{});
    const key=email.trim().toLowerCase();
    if(Object.values(users).some(u=>u.email===key)) throw new Error("That email already has an account.");
    const id=uid();
    users[id]={email:key,name,pass:weakHash(password)};
    lwrite(LK.users,users); lwrite(LK.session,id);
    this.current={id,email:key,name}; return this.current;
  },
  async signIn(email,password){
    if(HAS_FB){
      const cred=await auth.signInWithEmailAndPassword(email.trim(),password);
      this.current={id:cred.user.uid,email:cred.user.email||email.trim(),name:(cred.user.displayName||(email?email.split("@")[0]:"Camper"))};
      return this.current;
    }
    const users=lread(LK.users,{});
    const key=email.trim().toLowerCase();
    const entry=Object.entries(users).find(([,u])=>u.email===key);
    if(!entry||entry[1].pass!==weakHash(password)) throw new Error("Wrong email or password.");
    lwrite(LK.session,entry[0]);
    this.current={id:entry[0],email:key,name:entry[1].name}; return this.current;
  },
  async signOut(){
    if(HAS_FB){ await auth.signOut(); this.current=null; return; }
    localStorage.removeItem(LK.session); this.current=null;
  }
};

const Data = {
  subscribeTrips(myId, cb){
    if(!HAS_FB){
      const fn=(all)=>cb(Object.values(all).filter(t=>(t.memberIds||[]).includes(myId)));
      localSubs.add(fn); fn(lread(LK.trips,{}));
      return ()=>localSubs.delete(fn);
    }
    return db.collection("trips").where("memberIds","array-contains",myId)
      .onSnapshot(s=>cb(s.docs.map(d=>({id:d.id,...d.data()}))), e=>console.error(e));
  },
  async createTrip(t){
    const full={...t, code:code6(), createdAt:Date.now()};
    if(!HAS_FB){ const all=lread(LK.trips,{}); full.id=uid(); all[full.id]=full; lwrite(LK.trips,all); localPing(); return full; }
    const ref=await db.collection("trips").add(full); return {id:ref.id,...full};
  },
  async updateTrip(id,patch){
    if(!HAS_FB){ const all=lread(LK.trips,{}); if(all[id]){all[id]={...all[id],...patch};lwrite(LK.trips,all);localPing();} return; }
    await db.collection("trips").doc(id).update(patch);
  },
  async deleteTrip(id){
    if(!HAS_FB){ const all=lread(LK.trips,{}); delete all[id]; lwrite(LK.trips,all); localPing(); return; }
    await db.collection("trips").doc(id).delete();
  },
  async getProfile(uid){
    if(!HAS_FB){ const u=lread(LK.users,{})[uid]; return {photo:u?.photo||""}; }
    try{ const d=await db.collection("profiles").doc(uid).get(); return d.exists?d.data():{photo:""}; }catch{return {photo:""};}
  },
  async updateProfile(uid,fields){
    if(!HAS_FB){ const u=lread(LK.users,{}); if(u[uid]){u[uid]={...u[uid],...fields};lwrite(LK.users,u);} return; }
    await db.collection("profiles").doc(uid).set(fields,{merge:true});
  },
  async deleteAccount(uid){
    if(!HAS_FB){
      const u=lread(LK.users,{}); delete u[uid]; lwrite(LK.users,u);
      localStorage.removeItem(LK.session);
      const all=lread(LK.trips,{});
      Object.keys(all).forEach(id=>{
        if(all[id].ownerId===uid){delete all[id];}
        else{all[id].members=(all[id].members||[]).filter(m=>m.id!==uid);
          all[id].memberIds=(all[id].memberIds||[]).filter(x=>x!==uid);}
      });
      lwrite(LK.trips,all); return;
    }
    try{ await auth.currentUser.delete(); }
    catch(e){
      if(e.code==="auth/requires-recent-login")
        throw new Error("For security, please sign out and sign back in, then try again.");
      throw e;
    }
  },
  subscribeFieldNotes(tripId, cb){
    if(!HAS_FB){
      if(!fieldNoteSubs.has(tripId)) fieldNoteSubs.set(tripId,new Set());
      const key=`campable:fieldNotes:${tripId}`;
      const fn=()=>cb(lread(key,[]).sort((a,b)=>b.createdAt-a.createdAt));
      fieldNoteSubs.get(tripId).add(fn); fn();
      return ()=>fieldNoteSubs.get(tripId).delete(fn);
    }
    return db.collection("trips").doc(tripId).collection("fieldNotes")
      .orderBy("createdAt","desc")
      .onSnapshot(s=>cb(s.docs.map(d=>({id:d.id,...d.data()}))), e=>console.error(e));
  },
  async addFieldNote(tripId, note){
    if(!HAS_FB){
      const key=`campable:fieldNotes:${tripId}`;
      const notes=lread(key,[]); const n={...note,id:uid()}; notes.unshift(n); lwrite(key,notes);
      pingFieldNotes(tripId); return n;
    }
    const ref=await db.collection("trips").doc(tripId).collection("fieldNotes").add(note);
    return {id:ref.id,...note};
  },
  async deleteFieldNote(tripId, noteId){
    if(!HAS_FB){
      const key=`campable:fieldNotes:${tripId}`;
      lwrite(key,lread(key,[]).filter(n=>n.id!==noteId)); pingFieldNotes(tripId); return;
    }
    await db.collection("trips").doc(tripId).collection("fieldNotes").doc(noteId).delete();
  },
  async joinByCode(me, codeInput){
    const code=codeInput.trim().toUpperCase();
    if(!HAS_FB){
      const all=lread(LK.trips,{}); const t=Object.values(all).find(x=>x.code===code); if(!t)return null;
      t.members=t.members||[]; t.memberIds=t.memberIds||[];
      if(!t.memberIds.includes(me.id)){t.members.push(blankMember(me));t.memberIds.push(me.id);}
      all[t.id]=t; lwrite(LK.trips,all); localPing(); return t;
    }
    const q=await db.collection("trips").where("code","==",code).limit(1).get();
    if(q.empty)return null;
    const doc=q.docs[0], t=doc.data();
    const members=t.members||[], memberIds=t.memberIds||[];
    if(!memberIds.includes(me.id)){members.push(blankMember(me));memberIds.push(me.id);}
    await doc.ref.update({members,memberIds});
    return {id:doc.id,...t,members,memberIds};
  }
};

const blankMember=(me)=>({id:me.id,name:me.name,email:me.email||"",emergency:"",photo:""});

/* ---------- image handling: compress to fast, small data URL ---------- */
function fileToCompressedDataURL(file, maxDim=1200, quality=0.72){
  return new Promise((resolve,reject)=>{
    if(file.size > 15*1024*1024){
      return reject(new Error("That photo is over 15 MB — please resize or compress it first."));
    }
    const mime=(file.type||"").toLowerCase();
    const ext=(file.name||"").toLowerCase().split(".").pop();
    if(mime==="image/heic"||mime==="image/heif"||ext==="heic"||ext==="heif"){
      return reject(new Error("HEIC photos aren't supported by the browser. In the Photos app tap Share → Save to Files and choose JPEG, then try again."));
    }
    const reader=new FileReader();
    reader.onerror=()=>reject(new Error("Couldn't read that file."));
    reader.onload=()=>{
      const img=new Image();
      img.onerror=()=>reject(new Error("That file isn't a valid image. Try saving it as a JPEG, PNG, or WEBP first."));
      img.onload=()=>{
        let{width:w,height:h}=img;
        if(w>h && w>maxDim){h=Math.round(h*maxDim/w);w=maxDim;}
        else if(h>=w && h>maxDim){w=Math.round(w*maxDim/h);h=maxDim;}
        const c=document.createElement("canvas");c.width=w;c.height=h;
        const ctx=c.getContext("2d");
        ctx.fillStyle="#ffffff";
        ctx.fillRect(0,0,w,h);
        ctx.drawImage(img,0,0,w,h);
        resolve(c.toDataURL("image/jpeg",quality));
      };
      img.src=reader.result;
    };
    reader.readAsDataURL(file);
  });
}

/* ---------- maps directions (Apple on iOS, else Google) ---------- */
const isIOS=()=>/iPad|iPhone|iPod/.test(navigator.userAgent)||(navigator.platform==="MacIntel"&&navigator.maxTouchPoints>1);
function directionsURL(lat,lng,label){
  const q=encodeURIComponent(label||"Campsite");
  return isIOS()
    ? `https://maps.apple.com/?daddr=${lat},${lng}&q=${q}`
    : `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;
}

/* ============================================================
   SEED (local fallback, first trip for a new account)
   ============================================================ */
function seedFor(me){
  if(HAS_FB) return;
  const all=lread(LK.trips,{});
  if(Object.values(all).some(t=>(t.memberIds||[]).includes(me.id))) return;
  const id=uid();
  all[id]={
    id, ownerId:me.id, code:code6(), createdAt:Date.now(),
    name:"Dolly Sods Overlander", location:"Dolly Sods Wilderness, WV",
    start:"2026-09-18", end:"2026-09-21", cover:"",
    campLat:39.0476, campLng:-79.3074, campLabel:"Bear Rocks dispersed site",
    notes:"Ridge camp, dark-sky photography, bring the 270 awning.",
    memberIds:[me.id],
    members:[{...blankMember(me), emergency:"Sam — (555) 014-2231"}],
    meals:[
      {id:uid(),day:"Fri",title:"Foil-pack steak & potatoes",responsible:me.id,
        items:[{id:uid(),name:"Ribeye steak",qty:"2 lb",got:false},{id:uid(),name:"Baby potatoes",qty:"1 bag",got:false},{id:uid(),name:"Foil",qty:"1 roll",got:false}],
        cost:38,paidBy:me.id,forAll:true},
    ],
    trails:[{id:uid(),name:"Bear Rocks Loop",miles:4.2,difficulty:"Moderate",lat:39.0489,lng:-79.3010,done:false}],
    photos:[],
  };
  lwrite(LK.trips,all);
}

const ic=(n)=>({width:n,height:n,flexShrink:0});

/* ============================================================
   APP ROOT
   ============================================================ */
function App(){
  const [me,setMe]=useState(undefined);   // undefined=loading, null=logged out
  const [trips,setTrips]=useState(null);
  const [route,setRoute]=useState({name:"trips"});
  const [toast,setToast]=useState(null);
  const [profilePhoto,setProfilePhoto]=useState("");
  const flash=useCallback(m=>{setToast(m);setTimeout(()=>setToast(null),2400);},[]);

  useEffect(()=>{ Auth.init(u=>{ setMe(u); if(u){seedFor(u);Data.getProfile(u.id).then(p=>setProfilePhoto(p.photo||""));}else setTrips(null); }); },[]);

  useEffect(()=>{
    if(!me){return;}
    const unsub=Data.subscribeTrips(me.id,list=>{
      list.sort((a,b)=>(a.start||"9999").localeCompare(b.start||"9999"));
      setTrips(list);
    });
    return ()=>unsub&&unsub();
  },[me]);

  if(me===undefined) return <Splash/>;
  if(me===null) return <AuthScreen onAuthed={u=>setMe(u)} flash={flash}/>;
  if(trips===null) return <Splash/>;

  const current = route.name==="trip" ? trips.find(t=>t.id===route.id) : null;

  return (
    <div style={St.app}>
      <Contours/>
      {route.name!=="trip" &&
        <Header me={me} mode={HAS_FB?"live":"local"} photo={profilePhoto} onProfile={()=>setRoute({name:"me"})}/>}
      <main style={{...St.main, ...(route.name==="trip"?{padding:"0 0 0",maxWidth:"none"}:{})}}>
        {route.name==="trips" &&
          <Home trips={trips} me={me} flash={flash}
            onOpen={id=>setRoute({name:"trip",id})}
            onOpenSettings={id=>setRoute({name:"trip",id,tab:"settings"})}/>}
        {route.name==="trip" && current &&
          <TripShell trip={current} me={me} flash={flash} onBack={()=>setRoute({name:"trips"})} initialTab={route.tab||"plan"}/>}
        {route.name==="trip" && !current &&
          <div style={{...St.main}}><Empty icon={Ic.mtn} text="This trip is no longer available."/>
            <button style={St.primaryBtn} onClick={()=>setRoute({name:"trips"})}>Back to trips</button></div>}
        {route.name==="me" &&
          <Profile me={me} mode={HAS_FB?"live":"local"} photo={profilePhoto}
            onPhotoChange={p=>{
              setProfilePhoto(p);
              Data.updateProfile(me.id,{photo:p});
              (trips||[]).forEach(t=>{
                const members=(t.members||[]).map(m=>m.id===me.id?{...m,photo:p}:m);
                Data.updateTrip(t.id,{members});
              });
            }}
            onBack={()=>setRoute({name:"trips"})}
            onSignOut={async()=>{await Auth.signOut();setMe(null);setRoute({name:"trips"});setProfilePhoto("");}}
            onDeleted={()=>{setMe(null);setTrips(null);setRoute({name:"trips"});setProfilePhoto("");}}
            flash={flash}/>}
      </main>
      {toast && <div style={St.toast} className="fade"><Ic.check style={{width:15,height:15,color:"var(--gold)"}}/> {toast}</div>}
    </div>
  );
}

/* ============================================================
   AUTH (email + password)
   ============================================================ */
function AuthScreen({onAuthed, flash}){
  const [mode,setMode]=useState("up"); // up | in — new users land on sign-up
  const [email,setEmail]=useState(""); const [pass,setPass]=useState(""); const [name,setName]=useState("");
  const [busy,setBusy]=useState(false); const [err,setErr]=useState("");

  const go=async()=>{
    setErr(""); setBusy(true);
    try{
      if(mode==="up"){
        if(!name.trim()) throw new Error("Add your name so the crew knows who you are.");
        if(pass.length<6) throw new Error("Use at least 6 characters for your password.");
        const u=await Auth.signUp(email,pass,name.trim());
        seedFor(u); onAuthed(u);
      }else{
        const u=await Auth.signIn(email,pass); onAuthed(u);
      }
    }catch(e){ setErr(e.message||"Something went wrong."); }
    setBusy(false);
  };

  return (
    <div style={{...St.app,display:"grid",placeItems:"center",padding:24}}>
      <Contours/>
      <div style={{...St.card2,maxWidth:380,width:"100%",padding:28}} className="fade">
        <div style={{textAlign:"center",marginBottom:18}}>
          <div style={{...St.logoMark,margin:"0 auto 14px",width:52,height:52}}>
            <Ic.tent style={{width:26,height:26,color:"var(--night)"}}/>
          </div>
          <div style={{...St.brand,fontSize:26}}>CAMP<span style={{color:"var(--ember)"}}>ABLE</span></div>
          <p style={{...St.sub,marginTop:6}}>{mode==="up"?"Make an account so your trips follow you to any phone.":"Welcome back. Sign in to your trips."}</p>
        </div>
        {mode==="up" &&
          <Field label="Your name"><input style={St.input} value={name} autoFocus
            placeholder="Name" onChange={e=>setName(e.target.value)}/></Field>}
        <Field label="Email"><input style={St.input} type="email" value={email} autoComplete="email"
          placeholder="you@example.com" onChange={e=>setEmail(e.target.value)}/></Field>
        <Field label="Password"><input style={St.input} type="password" value={pass}
          autoComplete={mode==="up"?"new-password":"current-password"}
          placeholder="••••••" onChange={e=>setPass(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&go()}/></Field>
        {err && <div style={St.errText}>{err}</div>}
        <button style={{...St.primaryBtn,width:"100%",justifyContent:"center",marginTop:8,opacity:busy?.6:1}}
          disabled={busy} onClick={go}>
          {busy ? <Ic.tent style={{...ic(16)}} className="spin"/> : (mode==="up"?"Create account":"Sign in")}
        </button>
        <div style={{textAlign:"center",marginTop:16,fontSize:13,color:"var(--sage)"}}>
          {mode==="up" ? "Already have an account? " : "New here? "}
          <button style={St.linkBtn} onClick={()=>{setErr("");setMode(mode==="up"?"in":"up");}}>
            {mode==="up"?"Sign in":"Create one"}
          </button>
        </div>
        {!HAS_FB &&
          <div style={St.localBanner}>
            <Ic.phone style={{...ic(13),color:"var(--gold)"}}/>
            Demo mode: accounts live on this device only. Add Firebase keys (setup guide) for real cross-phone login.
          </div>}
      </div>
    </div>
  );
}

/* ============================================================
   HEADER / SPLASH
   ============================================================ */
function Header({me,mode,photo,onProfile}){
  return (
    <header style={St.header}>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <div style={St.logoMark}><Ic.tent style={{width:20,height:20,color:"var(--night)"}}/></div>
        <div>
          <div style={St.brand}>CAMP<span style={{color:"var(--ember)"}}>ABLE</span></div>
          <div style={St.tagline}>plan · pack · go together</div>
        </div>
      </div>
      <button style={St.profileBtn} onClick={onProfile}>
        <span style={{...St.modeDot,background:mode==="live"?"#5BBF8A":"var(--gold)"}}/>
        {photo
          ?<img src={photo} alt="" style={{...St.avatarSm,objectFit:"cover",padding:0}}/>

function Splash(){
  const [slow, setSlow] = useState(false);
  useEffect(() => { const t = setTimeout(() => setSlow(true), 6000); return () => clearTimeout(t); }, []);
  return <div style={{...St.app,display:"grid",placeItems:"center"}}>
    <Contours/>
    <div style={{textAlign:"center",padding:24}}>
      <Ic.tent style={{width:40,height:40,color:"var(--ember)"}} className="spin"/>
      <div style={{...St.brand,marginTop:12}}>CAMP<span style={{color:"var(--ember)"}}>ABLE</span></div>
      {slow &&
        <div style={{marginTop:20,color:"var(--sage)",fontSize:13,lineHeight:1.6,maxWidth:280}}>
          <p style={{margin:"0 0 12px"}}>Taking longer than expected. This usually means the Firebase scripts are slow to load on your network.</p>
          <button style={St.ghostBtn} onClick={() => window.location.reload()}>Reload</button>
        </div>}
    </div>
  </div>;
}

/* ============================================================
   HOME — trip list + all-trips map
   ============================================================ */
function Home({trips,me,flash,onOpen,onOpenSettings}){
  const [adding,setAdding]=useState(false);
  const [joining,setJoining]=useState(false);
  const [archiveOpen,setArchiveOpen]=useState(false);

  const activeTrips=useMemo(()=>trips.filter(t=>t.status!=="completed"),[trips]);
  const archivedTrips=useMemo(()=>trips.filter(t=>t.status==="completed"),[trips]);

  const grouped=useMemo(()=>{
    const g={}; activeTrips.forEach(t=>{const y=t.start?t.start.slice(0,4):"Unscheduled";(g[y]=g[y]||[]).push(t);}); return g;
  },[activeTrips]);

  const archivedGrouped=useMemo(()=>{
    const g={}; archivedTrips.forEach(t=>{const y=t.start?t.start.slice(0,4):"Unscheduled";(g[y]=g[y]||[]).push(t);}); return g;
  },[archivedTrips]);

  const addTrip=async(d)=>{
    await Data.createTrip({
      ownerId:me.id, name:d.name, location:d.location, start:d.start, end:d.end, cover:"",
      campLat:d.campLat?+d.campLat:null, campLng:d.campLng?+d.campLng:null, campLabel:d.campLabel||"",
      notes:"", memberIds:[me.id], members:[blankMember(me)], meals:[], trails:[], photos:[],
    });
    flash("Trip created"); setAdding(false);
  };
  const join=async(c)=>{
    const t=await Data.joinByCode(me,c);
    if(!t){flash("No trip with that code");return false;}
    flash(`Joined ${t.name}`); setJoining(false); return true;
  };

  return (
    <div className="fade">
      <div style={St.sectionHead}>
        <div>
          <h1 style={St.h1}>Your Trips</h1>
          <p style={St.sub}>{activeTrips.length} active {activeTrips.length===1?"trip":"trips"}{archivedTrips.length>0?` · ${archivedTrips.length} completed`:""}</p>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button style={St.ghostBtn} onClick={()=>setJoining(true)}>Join</button>
          <button style={St.primaryBtn} onClick={()=>setAdding(true)}><Ic.plus style={ic(16)}/> New trip</button>
        </div>
      </div>

      <AllTripsMap trips={activeTrips} onOpen={onOpen}/>

      {activeTrips.length===0 && archivedTrips.length===0 &&
        <Empty icon={Ic.pack} text="No trips yet. Plan one and share its code, or join a friend's with theirs."/>}

      {activeTrips.length===0 && archivedTrips.length>0 &&
        <Empty icon={Ic.pack} text="No active trips. All your trips are in the archive below."/>}

      {Object.keys(grouped).sort().map(year=>(
        <div key={year} style={{marginBottom:26}}>
          <div style={St.yearLabel}><span style={St.yearNum}>{year}</span><span style={St.yearLine}/></div>
          <div style={St.tripGrid}>
            {grouped[year].map(t=><TripCard key={t.id} trip={t} me={me} onOpen={()=>onOpen(t.id)} onSettings={()=>onOpenSettings(t.id)}/>)}
          </div>
        </div>
      ))}

      {archivedTrips.length>0&&(
        <div style={{marginBottom:26}}>
          <button
            onClick={()=>setArchiveOpen(o=>!o)}
            style={{display:"flex",alignItems:"center",justifyContent:"space-between",
              width:"100%",background:"var(--pine)",border:"1px solid var(--line)",borderRadius:14,
              color:"var(--paper)",padding:"12px 14px",cursor:"pointer",gap:8,marginBottom:archiveOpen?14:0}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <Ic.archive style={{...ic(15),color:"var(--sage)"}}/>
              <span style={{fontFamily:"'Oswald',sans-serif",fontWeight:600,fontSize:14,letterSpacing:.5}}>
                Archive
              </span>
              <span style={{fontSize:11,background:"var(--moss)",color:"var(--sage)",
                padding:"2px 8px",borderRadius:6,fontWeight:600}}>
                {archivedTrips.length}
              </span>
            </div>
            <Ic.chev style={{...ic(16),color:"var(--sage)",
              transform:archiveOpen?"rotate(90deg)":"none",transition:"transform .2s"}}/>
          </button>
          {archiveOpen&&(
            <div>
              {Object.keys(archivedGrouped).sort().reverse().map(year=>(
                <div key={year} style={{marginBottom:18}}>
                  <div style={St.yearLabel}><span style={St.yearNum}>{year}</span><span style={St.yearLine}/></div>
                  <div style={St.tripGrid}>
                    {archivedGrouped[year].map(t=><TripCard key={t.id} trip={t} me={me} onOpen={()=>onOpen(t.id)} onSettings={()=>onOpenSettings(t.id)}/>)}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {adding && <TripForm onSave={addTrip} onClose={()=>setAdding(false)}/>}
      {joining && <JoinForm onJoin={join} onClose={()=>setJoining(false)}/>}
    </div>
  );
}

function AllTripsMap({trips,onOpen}){
  // Default: collapsed on narrow screens (mobile), expanded on wide
  const [open,setOpen]=useState(()=>window.innerWidth>=600);
  const ref=useRef(null);
  const pts=trips.filter(t=>t.campLat&&t.campLng);

  useEffect(()=>{
    if(!open||!ref.current) return;
    const center=pts.length?[+pts[0].campLat,+pts[0].campLng]:[39.5,-98.35];
    const map=L.map(ref.current,{attributionControl:false}).setView(center,pts.length?5:3);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:18}).addTo(map);
    const bounds=[];
    pts.forEach(t=>{
      L.marker([+t.campLat,+t.campLng]).addTo(map)
        .bindPopup(`<b>${t.name}</b><br>${t.location||""}<br>${fmt(t.start)}`);
      bounds.push([+t.campLat,+t.campLng]);
    });
    if(bounds.length>1) map.fitBounds(L.latLngBounds(bounds).pad(0.35));
    setTimeout(()=>map.invalidateSize(),150);
    return ()=>map.remove();
  },[open, trips.map(t=>t.id+t.campLat+t.campLng).join()]);

  return (
    <div style={{marginBottom:20,background:"var(--pine)",border:"1px solid var(--line)",borderRadius:14,overflow:"hidden"}}>
      <button
        onClick={()=>setOpen(o=>!o)}
        style={{display:"flex",alignItems:"center",justifyContent:"space-between",
          width:"100%",background:"none",border:"none",color:"var(--paper)",
          padding:"12px 14px",cursor:"pointer",gap:8}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <Ic.map style={{...ic(15),color:"var(--ember2)"}}/>
          <span style={{fontFamily:"'Oswald',sans-serif",fontWeight:600,fontSize:14,letterSpacing:.5}}>
            All campsites
          </span>
          {pts.length>0 &&
            <span style={{fontSize:11,background:"var(--moss)",color:"var(--sage)",
              padding:"2px 8px",borderRadius:6,fontWeight:600}}>
              {pts.length} pinned
            </span>}
        </div>
        <Ic.chev style={{...ic(16),color:"var(--sage)",
          transform:open?"rotate(90deg)":"none",transition:"transform .2s"}}/>
      </button>
      {open &&
        <div style={{padding:"0 14px 14px"}}>
          <div ref={ref} style={St.mapHome}/>
          {pts.length===0 &&
            <div style={{...St.hintSm,marginTop:8}}>Add campsite coordinates to a trip and it'll appear here.</div>}
        </div>}
    </div>
  );
}

function TripCard({trip,me,onOpen,onSettings}){
  const isCreator=me && trip.ownerId===me.id;
  const creatorName=!isCreator
    ? ((trip.members||[]).find(m=>m.id===trip.ownerId)?.name||"")
    : "";
  const miles=(trip.trails||[]).reduce((a,t)=>a+(+t.miles||0),0);
  const dateLabel=trip.start?new Date(trip.start+"T00:00").toLocaleDateString(undefined,{month:"short",day:"numeric"}):"TBD";
  return (
    <button style={St.card} onClick={onOpen}>
      <div style={{...St.cardCover,...(trip.cover?{backgroundImage:`url(${trip.cover})`}:{})}}>
        {!trip.cover && <Ic.tent style={{width:30,height:30,color:"var(--mist)",opacity:.7}}/>}

        <div style={St.cardDate}>{dateLabel}</div>
        {isCreator
          ? <div
              role="button" tabIndex={0}
              title="Trip settings"

              style={{position:"absolute",top:10,right:10,background:"rgba(15,26,23,.82)",
                color:"var(--sage)",borderRadius:8,padding:"4px 7px",cursor:"pointer",

              <Ic.gear style={ic(13)}/>

          : <div style={{position:"absolute",top:10,right:10,background:"rgba(15,26,23,.82)",
              color:"var(--ember2)",fontSize:10,fontWeight:700,padding:"3px 8px",borderRadius:8,
              fontFamily:"'Oswald',sans-serif",letterSpacing:.5}}>

      </div>
      <div style={St.cardBody}>
        <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
          <div style={St.cardTitle}>{trip.name}</div>
          {trip.status==="completed" &&

/* ---------------- FIELD NOTES ---------------- */
function FieldNotesSection({trip, me, isAdmin}){
  const [notes,setNotes]=useState([]);
  const [text,setText]=useState("");
  const [posting,setPosting]=useState(false);

  useEffect(()=>{
    const unsub=Data.subscribeFieldNotes(trip.id,setNotes);
    return ()=>unsub?.();
  },[trip.id]);

  const fmtAge=(ts)=>{
    const diff=Date.now()-ts;
    if(diff<60000) return "just now";
    if(diff<3600000) return `${Math.floor(diff/60000)}m ago`;
    if(diff<86400000) return `${Math.floor(diff/3600000)}h ago`;
    return new Date(ts).toLocaleDateString(undefined,{month:"short",day:"numeric"});
  };

  const post=async()=>{
    const t=text.trim(); if(!t||posting) return;
    setPosting(true);
    try{
      await Data.addFieldNote(trip.id,{authorId:me.id,authorName:me.name,text:t,createdAt:Date.now()});
      setText("");
    }finally{ setPosting(false); }
  };

  const del=async(noteId)=>{
    if(!confirm("Delete this note?")) return;
    await Data.deleteFieldNote(trip.id,noteId);
  };

  return (
    <div style={St.block}>
      <div style={St.blockHead}><span>Field Notes</span><Ic.edit style={{...ic(13),color:"var(--sage)"}}/></div>
      {notes.length===0
        ? <div style={{fontSize:13,color:"var(--sage)",textAlign:"center",padding:"10px 0 6px"}}>No notes yet — be the first to post.</div>
        : <div style={{maxHeight:260,overflowY:"auto",display:"grid",gap:8,marginBottom:10}}>
            {notes.map(n=>(
              <div key={n.id} style={{background:"var(--night)",borderRadius:10,padding:"10px 12px"}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                  <span style={{fontSize:12.5,fontWeight:700,color:"var(--ember2)"}}>{n.authorName}</span>
                  <span style={{fontSize:11,color:"var(--mist)"}}>·</span>
                  <span style={{fontSize:11,color:"var(--sage)"}}>{fmtAge(n.createdAt)}</span>
                  {isAdmin &&
                    <button style={{...St.iconBtn,marginLeft:"auto",padding:2}} onClick={()=>del(n.id)} aria-label="Delete note">
                      <Ic.trash style={ic(13)}/>
                    </button>}
                </div>
                <div style={{fontSize:13.5,lineHeight:1.5,color:"var(--paper)",whiteSpace:"pre-wrap"}}>{n.text}</div>
              </div>
            ))}
          </div>}
      <div style={{display:"flex",gap:8,marginTop:4}}>
        <input style={{...St.input,fontSize:13}} placeholder="Leave a note…" value={text}
          onChange={e=>setText(e.target.value)}
          onKeyDown={e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();post();} }}/>
        <button style={{...St.smallBtn,opacity:posting||!text.trim()?0.5:1}}
          onClick={post} disabled={posting||!text.trim()}>Post</button>
      </div>
    </div>
  );
}

/* ---------------- OVERVIEW ---------------- */
function OverviewTab({trip,me,patch,flash,onBack,isAdmin,readOnly}){
  const allMealItems=(trip.meals||[]).reduce((a,m)=>[...a,...(m.items||[])],[]);
  const tasks=[
    ["Crew confirmed",(trip.members||[]).length>=2],
    ["Packing list complete",allMealItems.length>0&&allMealItems.every(i=>i.got)],
    ["Costs settled",trip.duesEnabled?(trip.members||[]).every(m=>m.duesPaid):(trip.expenses||[]).length>0],
    ["Itinerary planned",(trip.events||[]).length>=1],
    ["Waypoints added",(trip.trails||[]).some(t=>t.lat&&t.lng)],
  ];
  const pct=Math.round(tasks.filter(t=>t[1]).length/tasks.length*100);

  const leaveTrip=async()=>{
    if(!confirm("Leave this trip?"))return;
    const members=(trip.members||[]).filter(m=>m.id!==me.id);
    const memberIds=(trip.memberIds||[]).filter(id=>id!==me.id);
    await Data.updateTrip(trip.id,{members,memberIds});
    flash("Left trip"); onBack();
  };

  const completeTrip=async()=>{
    if(!confirm("Mark this trip as completed? It will move to the archive."))return;
    await Data.updateTrip(trip.id,{status:"completed",completedAt:new Date().toISOString()});
    flash("Trip completed"); onBack();
  };

  return (
    <div style={St.pane}>
      <WidgetGrid trip={trip} isAdmin={isAdmin} patch={patch}/>

      <DuesSection trip={trip} me={me} patch={patch} flash={flash} isAdmin={isAdmin} readOnly={readOnly}/>

      <div style={St.block}>
        <div style={St.blockHead}><span>Trip readiness</span><span style={{color:"var(--ember2)"}}>{pct}%</span></div>
        <div style={St.readyTrack}><div style={{...St.readyFill,width:`${pct}%`}}/></div>
        <div style={{marginTop:12,display:"grid",gap:8}}>
          {tasks.map(([label,ok])=>(
            <div key={label} style={St.taskRow}>
              <span style={{...St.taskDot,
                background:ok?"var(--ember)":"rgba(232,104,44,.12)",
                borderColor:ok?"var(--ember)":"var(--gold)"}}>
                {ok
                  ? <Ic.check style={{width:11,height:11,color:"var(--night)"}}/>
                  : <Ic.warn style={{width:11,height:11,color:"var(--gold)"}}/>}
              </span>
              <span style={{color:ok?"var(--paper)":"var(--sage)"}}>{label}</span>
            </div>
          ))}
        </div>
      </div>

      <FieldNotesSection trip={trip} me={me} isAdmin={isAdmin}/>

      <SiteInfoSection trip={trip} isAdmin={isAdmin} patch={patch} readOnly={readOnly}/>

      <div style={St.block}>
        <div style={St.blockHead}><span>Trip Notes</span><Ic.edit style={{...ic(13),color:"var(--sage)"}}/></div>
        {readOnly
          ? <div style={{fontSize:13.5,lineHeight:1.6,color:trip.notes?"var(--paper)":"var(--sage)",whiteSpace:"pre-wrap"}}>
              {trip.notes||"No trip notes."}
            </div>
          : <>
              <textarea style={St.notes} placeholder="Gear list, permits, dark-sky windows, bailout plan…"
                defaultValue={trip.notes} onBlur={e=>patch({notes:e.target.value})}/>
              <div style={St.hintSm}>Saves when you tap away.</div>
            </>}
      </div>

      {!readOnly && (
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          {!isAdmin &&
            <button style={St.ghostBtn} onClick={leaveTrip}>
              <Ic.logout style={ic(15)}/> Leave trip
            </button>}
          {isAdmin &&
            <button style={St.primaryBtn} onClick={completeTrip}>
              <Ic.checkCircle style={ic(15)}/> Complete trip
            </button>}
        </div>
      )}
    </div>
  );
}

/* ---------------- CREW (who owes + photos + items + emergency) ---------------- */
function CrewTab({trip,me,patch,flash,isAdmin,readOnly}){
  const members=trip.members||[]; const meals=trip.meals||[];

  // cost tally
  const tally=useMemo(()=>{
    const paid={},owes={}; members.forEach(m=>{paid[m.id]=0;owes[m.id]=0;});
    meals.forEach(m=>{const c=+m.cost||0; if(m.paidBy&&paid[m.paidBy]!=null)paid[m.paidBy]+=c;
      const share=members.length?c/members.length:0; members.forEach(mm=>owes[mm.id]+=share);});
    const map={}; members.forEach(m=>map[m.id]={paid:paid[m.id],share:owes[m.id],net:paid[m.id]-owes[m.id]});
    return map;
  },[trip]);

  const [fetchedPhotos,setFetchedPhotos]=useState({});
  useEffect(()=>{
    members.filter(m=>!m.photo).forEach(m=>{
      Data.getProfile(m.id).then(p=>{
        if(p.photo) setFetchedPhotos(prev=>({...prev,[m.id]:p.photo}));
      });
    });
  },[members.map(m=>m.id+(m.photo||"")).join()]);

  const [addName,setAddName]=useState("");
  const addMember=()=>{ if(!isAdmin)return; if(!addName.trim())return;
    patch({members:[...members,{id:uid(),name:addName.trim(),email:"",emergency:"",photo:""}]});
    setAddName(""); flash("Added to crew");
  };
  const updateMember=(id,fields)=>patch({members:members.map(m=>m.id===id?{...m,...fields}:m)});
  const delMember=(id)=>{ if(!isAdmin)return; patch({members:members.filter(m=>m.id!==id)}); };

  const cookingFor=(mid)=>{
    const out=[];
    meals.forEach(m=>{ if(m.responsible===mid) out.push(m.title); });
    return out;
  };
  const bringing=(mid)=>{
    const out=[];
    meals.forEach(m=>(m.items||[]).forEach(i=>{ if(i.responsible===mid) out.push(i.name+(i.qty?` (${i.qty})`:"")); }));
    return out;
  };

  return (
    <div style={St.pane}>
      {(isAdmin||trip.allowCrewShareCode) && <ShareCard trip={trip} flash={flash}/>}

      {isAdmin && !readOnly && (
        <div style={{display:"flex",gap:8,margin:"4px 0 16px"}}>
          <input style={St.input} placeholder="Add someone by name" value={addName}
            onChange={e=>setAddName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addMember()}/>
          <button style={St.smallBtn} onClick={addMember}><Ic.plus style={ic(15)}/></button>
        </div>
      )}

      <div style={{display:"grid",gap:14}}>
        {members.map(m=>{
          const t=tally[m.id]||{paid:0,share:0,net:0};
          const cooks=cookingFor(m.id);
          const brings=bringing(m.id);
          const isSelf=m.id===me.id;
          return (
            <div key={m.id} style={St.memberCard}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                {(m.photo||fetchedPhotos[m.id])
                  ? <img src={m.photo||fetchedPhotos[m.id]} alt="" style={St.memberAvatarImg}/>
                  : <div style={St.avatar}>{m.name.slice(0,1).toUpperCase()}</div>}
                <div style={{flex:1,minWidth:0}}>
                  <div style={St.itemTitle}>{m.name}{isSelf && <span style={St.youTag}>you</span>}</div>
                  {trip.duesEnabled && <div style={{...St.netPill,marginTop:4,display:"inline-flex",
                    background:t.net>=0?"rgba(127,169,155,.15)":"rgba(232,104,44,.15)",
                    color:t.net>=0?"var(--sage)":"var(--ember2)"}}>
                    {Math.abs(t.net)<0.005?"settled up":t.net>0?`gets back $${t.net.toFixed(2)}`:`owes $${Math.abs(t.net).toFixed(2)}`}
                  </div>}
                </div>
                {isAdmin && !readOnly && <button style={St.iconBtn} onClick={()=>delMember(m.id)} aria-label="Remove"><Ic.trash style={ic(15)}/></button>}
              </div>

              {trip.duesEnabled && <div style={St.memberMeta}>paid ${t.paid.toFixed(2)} · fair share ${t.share.toFixed(2)}</div>}

              <div style={St.memberRow}>
                <Ic.food style={{...ic(14),color:"var(--sage)"}}/>
                <span style={{color:cooks.length?"var(--paper)":"var(--sage)"}}>
                  {cooks.length?`Cook: ${cooks.join(", ")}`:"Not cooking any meals"}
                </span>
              </div>
              <div style={St.memberRow}>
                <Ic.cart style={{...ic(14),color:"var(--sage)"}}/>
                <span style={{color:brings.length?"var(--paper)":"var(--sage)"}}>
                  {brings.length?`Bringing: ${brings.join(", ")}`:"Nothing assigned to bring"}
                </span>
              </div>

              <div style={St.memberRow}>
                <Ic.sos style={{...ic(14),color:"var(--sage)"}}/>
                {readOnly
                  ? <span style={{fontSize:13,color:m.emergency?"var(--paper)":"var(--sage)"}}>{m.emergency||"No emergency contact"}</span>
                  : <input style={St.inlineInput} placeholder="Emergency contact (name + phone)"
                      defaultValue={m.emergency} onBlur={e=>updateMember(m.id,{emergency:e.target.value})}/>}
              </div>

            </div>
          );
        })}
      </div>
      {members.length===0 && <Empty icon={Ic.users} text="Add your crew. Costs split evenly across everyone here."/>}
    </div>
  );
}

/* ---------------- MEALS (with per-item shopping list) ---------------- */
function MealsTab({trip,patch,flash,readOnly}){
  const [open,setOpen]=useState(false);
  const [showList,setShowList]=useState(false);
  const meals=trip.meals||[]; const members=trip.members||[];
  const nameOf=mid=>members.find(x=>x.id===mid)?.name||"";

  const addMeal=(m)=>{
    patch({meals:[...meals,{id:uid(),title:m.title,day:m.day,cost:+m.cost||0,paidBy:m.paidBy||"",
      responsible:m.responsible||"",forAll:m.forAll,items:[]}]});
    flash("Meal added"); setOpen(false);
  };
  const delMeal=(id)=>patch({meals:meals.filter(m=>m.id!==id)});
  const updateMeal=(id,fields)=>patch({meals:meals.map(m=>m.id===id?{...m,...fields}:m)});

  const addItem=(mealId,name,qty)=>{
    if(!name.trim())return;
    patch({meals:meals.map(m=>m.id===mealId?{...m,items:[...(m.items||[]),{id:uid(),name:name.trim(),qty:qty.trim(),got:false,responsible:""}]}:m)});
  };
  const toggleItem=(mealId,itemId)=>patch({meals:meals.map(m=>m.id===mealId?{...m,items:m.items.map(i=>i.id===itemId?{...i,got:!i.got}:i)}:m)});
  const delItem=(mealId,itemId)=>patch({meals:meals.map(m=>m.id===mealId?{...m,items:m.items.filter(i=>i.id!==itemId)}:m)});
  const updateItem=(mealId,itemId,fields)=>patch({meals:meals.map(m=>m.id===mealId?{...m,items:m.items.map(i=>i.id===itemId?{...i,...fields}:i)}:m)});

  const allItems=useMemo(()=>{
    const out=[]; meals.forEach(m=>(m.items||[]).forEach(i=>out.push({...i,meal:m.title,mealId:m.id})));
    return out;
  },[meals]);
  const toBuy=allItems.filter(i=>!i.got).length;

  const days=["Thu","Fri","Sat","Sun","Mon"];

  return (
    <div style={St.pane}>
      <div style={St.listHead}>
        <h2 style={St.h2}>Meal plan</h2>
        <div style={{display:"flex",gap:8}}>
          <button style={St.smallBtn} onClick={()=>setShowList(true)}><Ic.cart style={ic(14)}/> List{toBuy?` (${toBuy})`:""}</button>
          {!readOnly&&<button style={St.smallBtn} onClick={()=>setOpen(true)}><Ic.plus style={ic(14)}/> Meal</button>}
        </div>
      </div>

      {meals.length===0 && <Empty icon={Ic.food} text="Plan meals, add the ingredients each one needs, and the app builds your shopping list."/>}

      <div style={{display:"grid",gap:12}}>
        {meals.map(m=>(
          <MealCard key={m.id} meal={m} members={members} nameOf={nameOf} readOnly={readOnly}
            onDel={()=>delMeal(m.id)} onUpdate={f=>updateMeal(m.id,f)}
            onAddItem={(n,q)=>addItem(m.id,n,q)} onToggleItem={iid=>toggleItem(m.id,iid)} onDelItem={iid=>delItem(m.id,iid)} onUpdateItem={(iid,f)=>updateItem(m.id,iid,f)}/>
        ))}
      </div>

      {open && !readOnly && <FormSheet title="Add meal" onClose={()=>setOpen(false)} onSave={addMeal}
        fields={[
          {k:"title",label:"Meal",type:"text",req:true},
          {k:"day",label:"Day",type:"select",opts:days.map(d=>({v:d,l:d})),def:"Fri"},
          {k:"cost",label:"Estimated cost ($)",type:"number"},
          {k:"paidBy",label:"Paid by",type:"select",allowEmpty:true,opts:members.map(x=>({v:x.id,l:x.name}))},
          {k:"responsible",label:"Cook (who's making this meal)",type:"select",allowEmpty:true,opts:members.map(x=>({v:x.id,l:x.name}))},
          {k:"forAll",label:"Split cost across whole crew",type:"bool",def:true},
        ]}/>}

      {showList && <ShoppingList items={allItems} members={members} onToggle={(mealId,itemId)=>toggleItem(mealId,itemId)} onClose={()=>setShowList(false)}/>}
    </div>
  );
}

function MealCard({meal,members,nameOf,readOnly,onDel,onUpdate,onAddItem,onToggleItem,onDelItem,onUpdateItem}){
  const [exp,setExp]=useState(false);
  const [iname,setIname]=useState(""); const [iqty,setIqty]=useState("");
  const items=meal.items||[];
  const got=items.filter(i=>i.got).length;
  return (
    <div style={St.mealCard}>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <div style={St.dayChip}>{meal.day}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={St.itemTitle}>{meal.title}</div>
          <div style={St.itemMeta}>
            ${(+meal.cost||0).toFixed(2)}
            {meal.paidBy?` · paid by ${nameOf(meal.paidBy)}`:""}
            {meal.responsible?` · Cook: ${nameOf(meal.responsible)}`:""}
          </div>
        </div>
        {!readOnly&&<button style={St.iconBtn} onClick={onDel} aria-label="Delete meal"><Ic.trash style={ic(15)}/></button>}
      </div>

      <button style={St.expandRow} onClick={()=>setExp(!exp)}>
        <Ic.cart style={{...ic(13),color:"var(--sage)"}}/>
        {items.length?`${items.length} ingredient${items.length>1?"s":""} · ${got}/${items.length} got`:"Add ingredients"}
        <Ic.chev style={{...ic(14),marginLeft:"auto",transform:exp?"rotate(90deg)":"none",transition:"transform .2s"}}/>
      </button>

      {exp &&
        <div style={St.itemsBox}>
          {items.map(i=>(
            <div key={i.id} style={St.shopRow}>
              <button style={{...St.checkBtn,...(i.got?St.checkOn:{})}} onClick={()=>onToggleItem(i.id)} aria-label="Got it">
                {i.got && <Ic.check style={{width:12,height:12,color:"var(--night)"}}/>}
              </button>
              <span style={{flex:1,textDecoration:i.got?"line-through":"none",opacity:i.got?.55:1,fontSize:13.5}}>
                {i.name}{i.qty?` · ${i.qty}`:""}
              </span>
              {members.length>0 && onUpdateItem && !readOnly && (
                <select style={St.itemRespSelect} value={i.responsible||""} title="Who's bringing this?"
                  onChange={e=>onUpdateItem(i.id,{responsible:e.target.value})}>
                  <option value="">—</option>
                  {members.map(m=><option key={m.id} value={m.id}>{m.name.split(" ")[0]}</option>)}
                </select>
              )}
              {!readOnly&&<button style={St.iconBtn} onClick={()=>onDelItem(i.id)} aria-label="Remove"><Ic.x style={ic(13)}/></button>}
            </div>
          ))}
          {!readOnly&&<div style={{display:"flex",gap:6,marginTop:8}}>
            <input style={{...St.input,flex:2}} placeholder="Ingredient" value={iname} onChange={e=>setIname(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter"){onAddItem(iname,iqty);setIname("");setIqty("");}}}/>
            <input style={{...St.input,flex:1}} placeholder="Qty" value={iqty} onChange={e=>setIqty(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter"){onAddItem(iname,iqty);setIname("");setIqty("");}}}/>
            <button style={St.smallBtn} onClick={()=>{onAddItem(iname,iqty);setIname("");setIqty("");}}><Ic.plus style={ic(15)}/></button>
          </div>}
        </div>}
    </div>
  );
}

function ShoppingList({items,members,onToggle,onClose}){
  const remaining=items.filter(i=>!i.got);
  const done=items.filter(i=>i.got);
  const firstNameOf=mid=>members?(members.find(x=>x.id===mid)?.name.split(" ")[0]||""):"";
  return (
    <Modal title="Shopping list" onClose={onClose}>
      {items.length===0 && <p style={St.sub}>No ingredients yet. Open a meal and add what it needs.</p>}
      {remaining.length>0 &&
        <div style={{marginBottom:14}}>
          <div style={St.miniLabel}>To buy ({remaining.length})</div>
          <div style={{display:"grid",gap:6,marginTop:8}}>
            {remaining.map(i=>(
              <div key={i.id} style={St.shopRow}>
                <button style={St.checkBtn} onClick={()=>onToggle(i.mealId,i.id)} aria-label="Got it"/>
                <span style={{flex:1,fontSize:13.5}}>{i.name}{i.qty?` · ${i.qty}`:""}</span>
                {i.responsible && <span style={St.shopBringer}>{firstNameOf(i.responsible)}</span>}
                <span style={St.shopMeal}>{i.meal}</span>
              </div>
            ))}
          </div>
        </div>}
      {done.length>0 &&
        <div>
          <div style={St.miniLabel}>Got it ({done.length})</div>
          <div style={{display:"grid",gap:6,marginTop:8}}>
            {done.map(i=>(
              <div key={i.id} style={St.shopRow}>
                <button style={{...St.checkBtn,...St.checkOn}} onClick={()=>onToggle(i.mealId,i.id)} aria-label="Undo">
                  <Ic.check style={{width:12,height:12,color:"var(--night)"}}/>
                </button>
                <span style={{flex:1,fontSize:13.5,textDecoration:"line-through",opacity:.55}}>{i.name}{i.qty?` · ${i.qty}`:""}</span>
                {i.responsible && <span style={{...St.shopBringer,opacity:.55}}>{firstNameOf(i.responsible)}</span>}
              </div>
            ))}
          </div>
        </div>}
    </Modal>
  );
}

/* ---------------- COSTS (itemized shared expenses) ---------------- */
function CostsTab({trip,patch,flash,readOnly}){
  const expenses=trip.expenses||[];
  const members=trip.members||[];
  const n=members.length||1;
  const total=expenses.reduce((a,e)=>a+(+e.amount||0),0);

  const [adding,setAdding]=useState(false);
  const [editId,setEditId]=useState(null);
  const [formName,setFormName]=useState("");
  const [formAmt,setFormAmt]=useState("");

  const openAdd=()=>{setFormName("");setFormAmt("");setAdding(true);setEditId(null);};
  const openEdit=(e)=>{setFormName(e.name);setFormAmt(String(e.amount));setEditId(e.id);setAdding(false);};
  const cancelForm=()=>{setAdding(false);setEditId(null);};

  const saveAdd=()=>{
    if(!formName.trim()||!formAmt)return;
    patch({expenses:[...expenses,{id:uid(),name:formName.trim(),amount:+formAmt}]});
    setAdding(false);setFormName("");setFormAmt("");flash("Expense added");
  };
  const saveEdit=()=>{
    if(!formName.trim()||!formAmt)return;
    patch({expenses:expenses.map(e=>e.id===editId?{...e,name:formName.trim(),amount:+formAmt}:e)});
    setEditId(null);flash("Updated");
  };
  const del=(id)=>{patch({expenses:expenses.filter(e=>e.id!==id)});flash("Removed");};

  const expenseForm=(onSave,label)=>(
    <div style={{...St.block,padding:14,marginBottom:10}}>
      <div style={{fontFamily:"'Oswald',sans-serif",fontSize:13,fontWeight:600,marginBottom:10,letterSpacing:.5}}>{label}</div>
      <div style={{display:"flex",gap:8,marginBottom:10}}>
        <div style={{flex:2}}>
          <div style={St.fieldLabel}>Item name</div>
          <input style={St.input} autoFocus value={formName} placeholder="e.g. Campsite fee"
            onChange={ev=>setFormName(ev.target.value)} onKeyDown={ev=>ev.key==="Enter"&&onSave()}/>
        </div>
        <div style={{flex:1}}>
          <div style={St.fieldLabel}>Amount ($)</div>
          <input style={St.input} type="number" min="0" step="0.01" value={formAmt} placeholder="0.00"
            onChange={ev=>setFormAmt(ev.target.value)} onKeyDown={ev=>ev.key==="Enter"&&onSave()}/>
        </div>
      </div>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
        <button style={St.ghostBtn} onClick={cancelForm}>Cancel</button>
        <button style={St.primaryBtn} onClick={onSave}><Ic.check style={ic(15)}/> {editId?"Save":"Add"}</button>
      </div>
    </div>
  );

  return (
    <div style={St.pane}>
      <div style={St.listHead}>
        <h2 style={St.h2}>Shared Expenses</h2>
        {!readOnly&&!adding&&!editId&&<button style={St.smallBtn} onClick={openAdd}><Ic.plus style={ic(14)}/> Add</button>}
      </div>

      {expenses.length>0&&(
        <div style={St.block}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={St.miniLabel}>Total</div>
              <div style={{fontFamily:"'Oswald',sans-serif",fontSize:28,fontWeight:700,color:"var(--gold)",marginTop:2}}>
                ${total.toFixed(2)}
              </div>
            </div>
            {members.length>0&&(
              <div style={{textAlign:"right"}}>
                <div style={St.miniLabel}>Per person ({n})</div>
                <div style={{fontFamily:"'Oswald',sans-serif",fontSize:22,fontWeight:700,color:"var(--ember2)",marginTop:2}}>
                  ${(total/n).toFixed(2)}
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {adding&&expenseForm(saveAdd,"New expense")}

      <div style={{display:"grid",gap:10}}>
        {expenses.map(e=>(
          editId===e.id
            ? <div key={e.id}>{expenseForm(saveEdit,"Edit expense")}</div>
            : (
              <div key={e.id} style={{...St.block,padding:14,marginBottom:0,display:"flex",alignItems:"center",gap:12}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={St.itemTitle}>{e.name}</div>
                  <div style={St.itemMeta}>
                    ${(+e.amount||0).toFixed(2)} total{members.length>0?` · $${(+e.amount/n).toFixed(2)} each`:""}
                  </div>
                </div>
                <div style={{fontFamily:"'Oswald',sans-serif",fontSize:18,fontWeight:700,color:"var(--paper)",flexShrink:0,marginRight:4}}>
                  ${(+e.amount||0).toFixed(2)}
                </div>
                {!readOnly&&<button style={St.iconBtn} onClick={()=>openEdit(e)} aria-label="Edit"><Ic.edit style={ic(15)}/></button>}
                {!readOnly&&<button style={St.iconBtn} onClick={()=>del(e.id)} aria-label="Delete"><Ic.trash style={ic(15)}/></button>}
              </div>
            )
        ))}
      </div>

      {expenses.length===0&&!adding&&(
        <Empty icon={Ic.dollar} text="Add shared expenses like the campsite fee, firewood, ice, or propane. Costs split evenly across your crew."/>
      )}
    </div>
  );
}

/* ---------------- TRIP SETTINGS (admin only) ---------------- */
function TripSettingsTab({trip,me,patch,flash,onBack}){
  const [name,setName]=useState(trip.name);
  const [loc,setLoc]=useState(trip.location||"");
  const [start,setStart]=useState(trip.start||"");
  const [end,setEnd]=useState(trip.end||"");

  const saveDetails=()=>{
    if(!name.trim()){flash("Trip name required");return;}
    patch({name:name.trim(),location:loc.trim(),start,end}); flash("Trip details saved");
  };

  const copyCode=async()=>{try{await navigator.clipboard.writeText(trip.code);flash("Code copied");}catch{flash(trip.code);}};
  const shareCode=async()=>{
    const text=`Join "${trip.name}" on Campable. Tap Join and enter code: ${trip.code}`;
    if(navigator.share){try{await navigator.share({title:"Campable",text});return;}catch{}}
    copyCode();
  };

  const deleteTrip=async()=>{
    if(!confirm("Delete this trip for everyone? This can't be undone."))return;
    await Data.deleteTrip(trip.id); flash("Trip deleted"); onBack();
  };

  return (
    <div style={St.pane}>
      {/* Trip Details */}
      <div style={St.block}>
        <div style={St.blockHead}><span>Trip Details</span><Ic.edit style={{...ic(13),color:"var(--sage)"}}/></div>
        <Field label="Trip name"><input style={St.input} value={name} onChange={e=>setName(e.target.value)}/></Field>
        <Field label="Location"><input style={St.input} value={loc} placeholder="Wilderness area, state" onChange={e=>setLoc(e.target.value)}/></Field>
        <div style={{display:"flex",gap:10}}>
          <Field label="Start"><input type="date" style={St.input} value={start} onChange={e=>setStart(e.target.value)}/></Field>
          <Field label="End"><input type="date" style={St.input} value={end} onChange={e=>setEnd(e.target.value)}/></Field>
        </div>
        <button style={St.smallBtn} onClick={saveDetails}><Ic.check style={ic(14)}/> Save details</button>
      </div>

      {/* Campsite */}
      <CampsiteCard trip={trip} patch={patch} flash={flash}/>

      {/* Cover Photo */}
      <ImagePicker label="Cover photo" current={trip.cover}
        onPicked={dataUrl=>{patch({cover:dataUrl});flash("Cover updated");}}
        onClear={()=>patch({cover:""})} flash={flash}/>

      {/* Invite Code */}
      <div style={St.block}>
        <div style={St.blockHead}><span>Invite Code</span><Ic.share style={{...ic(13),color:"var(--sage)"}}/></div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div>
            <div style={St.shareLabel}>Crew invite code</div>
            <div style={St.shareCode}>{trip.code}</div>
            <div style={St.hintSm}>Share this with people you want to join the trip.</div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button style={St.iconChip} onClick={copyCode} aria-label="Copy"><Ic.copy style={ic(16)}/></button>
            <button style={St.iconChip} onClick={shareCode} aria-label="Share"><Ic.share style={ic(16)}/></button>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"var(--night)",borderRadius:10,padding:"10px 12px"}}>
          <div>
            <div style={{fontSize:13,fontWeight:600,marginBottom:2}}>Let crew share code</div>
            <div style={St.hintSm}>Show the invite code to all members in the Crew tab.</div>
          </div>
          <button style={{...St.toggle,...(trip.allowCrewShareCode?St.toggleOn:{})}}
            onClick={()=>patch({allowCrewShareCode:!trip.allowCrewShareCode})}>
            <span style={{...St.toggleKnob,...(trip.allowCrewShareCode?St.toggleKnobOn:{})}}/>
            {trip.allowCrewShareCode?"On":"Off"}
          </button>
        </div>
      </div>

      {/* Dues Settings */}
      <div style={St.block}>
        <div style={St.blockHead}><span>Dues</span><Ic.dollar style={{...ic(13),color:"var(--sage)"}}/></div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:trip.duesEnabled?14:0}}>
          <div>
            <div style={{fontSize:13,fontWeight:600,marginBottom:2}}>Enable trip dues</div>
            <div style={St.hintSm}>Collect a set amount from each crew member.</div>
          </div>
          <button style={{...St.toggle,...(trip.duesEnabled?St.toggleOn:{})}}
            onClick={()=>patch({duesEnabled:!trip.duesEnabled})}>
            <span style={{...St.toggleKnob,...(trip.duesEnabled?St.toggleKnobOn:{})}}/>
            {trip.duesEnabled?"On":"Off"}
          </button>
        </div>
        {trip.duesEnabled && <>
          <Field label="Amount per person ($)">
            <input style={St.input} type="number" min="0" step="0.01"
              value={trip.duesAmount||""} placeholder="0.00"
              onChange={e=>patch({duesAmount:+e.target.value})}/>
          </Field>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"var(--night)",borderRadius:10,padding:"10px 12px",marginBottom:14}}>
            <div>
              <div style={{fontSize:13,fontWeight:600,marginBottom:2}}>Admin must confirm payments</div>
              <div style={St.hintSm}>When a member marks dues paid, you confirm it in real life first.</div>
            </div>
            <button style={{...St.toggle,...(trip.requireDuesConfirm?St.toggleOn:{})}}
              onClick={()=>patch({requireDuesConfirm:!trip.requireDuesConfirm})}>
              <span style={{...St.toggleKnob,...(trip.requireDuesConfirm?St.toggleKnobOn:{})}}/>
              {trip.requireDuesConfirm?"On":"Off"}
            </button>
          </div>
          <div style={St.miniLabel}>Member dues status</div>
          <div style={{display:"grid",gap:8,marginTop:8}}>
            {(trip.members||[]).map(m=>(
              <div key={m.id} style={{display:"flex",alignItems:"center",gap:10,background:"var(--night)",borderRadius:10,padding:"10px 12px"}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:13.5,fontWeight:600}}>{m.name}{m.id===me.id?" (you)":""}</div>
                  <div style={{fontSize:12,marginTop:2,
                    color:m.duesPaid?"#5BBF8A":m.duesPending?"var(--gold)":"var(--sage)"}}>
                    {m.duesPaid?"✓ Confirmed paid":m.duesPending?"⏳ Pending confirmation":"Not paid"}
                  </div>
                </div>
                {m.duesPending&&!m.duesPaid&&
                  <button style={{...St.smallBtn,padding:"5px 10px",fontSize:12}} onClick={()=>{
                    patch({members:(trip.members||[]).map(x=>x.id===m.id?{...x,duesPaid:true,duesPending:false}:x)});
                    flash(`${m.name}'s dues confirmed`);
                  }}><Ic.check style={ic(13)}/> Confirm</button>}
                {m.duesPaid&&
                  <button style={St.iconBtn} title="Reset dues" onClick={()=>{
                    patch({members:(trip.members||[]).map(x=>x.id===m.id?{...x,duesPaid:false,duesPending:false}:x)});
                    flash("Dues reset");
                  }}><Ic.x style={ic(14)}/></button>}
              </div>
            ))}
          </div>
        </>}
      </div>

      {/* Trip Status */}
      <div style={St.block}>
        <div style={St.blockHead}><span>Trip Status</span><Ic.checkCircle style={{...ic(13),color:"var(--sage)"}}/></div>
        {trip.status==="completed"
          ? <>
              <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px",
                background:"rgba(91,191,138,.1)",border:"1px solid rgba(91,191,138,.25)",
                borderRadius:10,marginBottom:14}}>
                <Ic.checkCircle style={{...ic(16),color:"#5BBF8A",flexShrink:0}}/>
                <div>
                  <div style={{fontSize:13.5,fontWeight:600,color:"#5BBF8A"}}>Trip completed</div>
                  {trip.completedAt&&<div style={St.hintSm}>on {fmt(trip.completedAt)}</div>}
                </div>
              </div>
              <div style={St.hintSm}>This trip is archived and read-only. Restore it to allow editing again.</div>
              <button style={{...St.smallBtn,marginTop:12}} onClick={()=>{
                patch({status:"active",completedAt:null}); flash("Trip restored to active");
              }}><Ic.back style={ic(14)}/> Restore to active</button>
            </>
          : <>
              <div style={St.hintSm}>Mark this trip as completed to move it to the archive. The crew can still view everything, but nothing will be editable.</div>
              <CompleteTripForm trip={trip} patch={patch} flash={flash}/>
            </>}
      </div>

      <button style={St.dangerBtn} onClick={deleteTrip}>
        <Ic.trash style={ic(15)}/> Delete trip
      </button>
    </div>
  );
}

function CompleteTripForm({trip,patch,flash}){
  const today=new Date().toISOString().slice(0,10);
  const defaultDate=trip.end&&trip.end<=today?trip.end:today;
  const [completedAt,setCompletedAt]=useState(defaultDate);
  return (
    <div style={{marginTop:12}}>
      <Field label="Completion date">
        <input type="date" style={St.input} value={completedAt} max={today}
          onChange={e=>setCompletedAt(e.target.value)}/>
      </Field>
      <button style={{...St.smallBtn,marginTop:8,background:"rgba(91,191,138,.18)",color:"#5BBF8A",border:"1px solid rgba(91,191,138,.35)"}}
        onClick={()=>{patch({status:"completed",completedAt}); flash("Trip marked as completed");}}>
        <Ic.checkCircle style={ic(14)}/> Mark as completed
      </button>
    </div>
  );
}

/* ---------------- DUES SECTION (overview) ---------------- */
function DuesSection({trip,me,patch,flash,isAdmin,readOnly}){
  if(!trip.duesEnabled) return null;
  const myMember=(trip.members||[]).find(m=>m.id===me.id);
  if(!myMember) return null;

  const markPaid=()=>{
    const paid=!trip.requireDuesConfirm;
    patch({members:(trip.members||[]).map(m=>
      m.id===me.id?{...m,duesPaid:paid,duesPending:!paid}:m
    )});
    flash(trip.requireDuesConfirm?"Payment submitted — awaiting admin confirmation":"Dues marked as paid");
  };

  return (
    <div style={St.block}>
      <div style={St.blockHead}><span>Trip Dues</span><Ic.dollar style={{...ic(13),color:"var(--sage)"}}/></div>
      {trip.duesAmount>0&&(
        <div style={{fontFamily:"'Oswald',sans-serif",fontSize:22,fontWeight:700,color:"var(--gold)",marginBottom:12}}>
          ${(+trip.duesAmount).toFixed(2)}
          <span style={{fontSize:13,fontFamily:"'Inter',sans-serif",color:"var(--sage)",fontWeight:400}}> per person</span>
        </div>
      )}
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        {myMember.duesPaid
          ?<div style={{color:"#5BBF8A",fontSize:13.5,fontWeight:600,display:"flex",alignItems:"center",gap:6}}>
            <Ic.check style={ic(16)}/> Your dues are confirmed paid</div>
          :myMember.duesPending
            ?<div style={{color:"var(--gold)",fontSize:13.5,fontWeight:600}}>⏳ Payment pending confirmation</div>
            :!readOnly&&<button style={St.primaryBtn} onClick={markPaid}><Ic.dollar style={ic(15)}/> Mark dues as paid</button>}
      </div>
      {isAdmin&&(trip.members||[]).some(m=>m.duesPending&&!m.duesPaid)&&(
        <div style={{marginTop:12,padding:"10px 12px",background:"rgba(232,178,60,.08)",border:"1px solid rgba(232,178,60,.25)",borderRadius:10,fontSize:12.5,color:"var(--gold)"}}>
          {(trip.members||[]).filter(m=>m.duesPending&&!m.duesPaid).length} pending confirmation — confirm in Settings tab.
        </div>
      )}
    </div>
  );
}

/* ---------------- ITINERARY (schedule + map + photos) ---------------- */
function ItineraryTab({trip,me,patch,flash,readOnly}){
  const members=trip.members||[];
  const trails=trip.trails||[];
  const photos=trip.photos||[];
  const events=trip.events||[];

  /* ── schedule ── */
  const [addEvt,setAddEvt]=useState(false);

  const tripDays=useMemo(()=>{
    if(!trip.start) return [{v:"Day 1",l:"Day 1"},{v:"Day 2",l:"Day 2"},{v:"Day 3",l:"Day 3"},{v:"Day 4",l:"Day 4"},{v:"Day 5",l:"Day 5"}];
    const start=new Date(trip.start+"T00:00");
    const end=trip.end?new Date(trip.end+"T00:00"):new Date(start.getTime()+4*86400000);
    const days=[];
    for(let d=new Date(start);d<=end;d=new Date(d.getTime()+86400000))
      days.push({v:d.toISOString().slice(0,10),l:d.toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"})});
    return days;
  },[trip.start,trip.end]);

  const byDay=useMemo(()=>{
    const g={}; tripDays.forEach(d=>{g[d.v]=[];});
    [...events].sort((a,b)=>(a.day+"|"+(a.time||"")).localeCompare(b.day+"|"+(b.time||""))).forEach(e=>{
      if(g[e.day]) g[e.day].push(e); else g[e.day]=[e];
    });
    return g;
  },[events,tripDays]);

  const addEvent=e=>{patch({events:[...events,{id:uid(),...e}]});flash("Event added");setAddEvt(false);};
  const delEvent=id=>patch({events:events.filter(e=>e.id!==id)});
  const eventTypes=["Activity","Hike","Meal","Travel","Other"];

  /* ── map ── */
  const ref=useRef(null);
  const [openTrail,setOpenTrail]=useState(false);
  const [pick,setPick]=useState(false);
  const [preset,setPreset]=useState(null);
  const waypoints=trails.filter(t=>t.lat&&t.lng);

  useEffect(()=>{
    if(!ref.current) return;
    const cs=(trip.campLat&&trip.campLng)?[+trip.campLat,+trip.campLng]:null;
    const center=cs||(waypoints.length?[+waypoints[0].lat,+waypoints[0].lng]:[39.0476,-79.3074]);
    const map=L.map(ref.current,{attributionControl:false}).setView(center,12);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:18}).addTo(map);
    const bounds=[];
    if(cs){
      const tentIcon=L.divIcon({className:"",html:`<div style="background:#E8682C;width:26px;height:26px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:grid;place-items:center;box-shadow:0 2px 6px rgba(0,0,0,.4)"><span style="transform:rotate(45deg);font-size:13px">⛺</span></div>`,iconSize:[26,26],iconAnchor:[13,26]});
      L.marker(cs,{icon:tentIcon}).addTo(map).bindPopup(`<b>Campsite</b><br>${trip.campLabel||trip.name}`);
      bounds.push(cs);
    }
    waypoints.forEach(p=>{
      L.marker([+p.lat,+p.lng]).addTo(map).bindPopup(`<b>${p.name}</b><br>${(+p.miles||0).toFixed(1)} mi · ${p.difficulty||""}`);
      bounds.push([+p.lat,+p.lng]);
    });
    if(bounds.length>1) map.fitBounds(L.latLngBounds(bounds).pad(0.3));
    setTimeout(()=>map.invalidateSize(),120);
    return ()=>map.remove();
  },[trip.id,trip.campLat,trip.campLng,trails.map(t=>t.id+t.lat+t.lng).join()]);

  const addTrail=t=>{
    patch({trails:[...trails,{id:uid(),done:false,name:t.name,miles:+t.miles||0,difficulty:t.difficulty,
      lat:t.lat?+t.lat:null,lng:t.lng?+t.lng:null}]});
    flash("Trail added");setOpenTrail(false);setPreset(null);
  };
  const delTrail=id=>patch({trails:trails.filter(t=>t.id!==id)});
  const toggleTrail=id=>patch({trails:trails.map(t=>t.id===id?{...t,done:!t.done}:t)});

  /* ── photos ── */
  const [viewPhoto,setViewPhoto]=useState(null);
  const getName=id=>members.find(m=>m.id===id)?.name||"Someone";

  const addPhotos=async fileList=>{
    const files=Array.from(fileList).slice(0,6);
    try{
      const added=[];
      for(const f of files){const d=await fileToCompressedDataURL(f);added.push({id:uid(),by:me.id,data:d,ts:Date.now()});}
      patch({photos:[...photos,...added]});flash(`${added.length} photo${added.length>1?"s":""} added`);
    }catch(e){flash(e.message||"Couldn't add photo");}
  };
  const delPhoto=pid=>{patch({photos:photos.filter(p=>p.id!==pid)});flash("Photo removed");setViewPhoto(null);};

  return (
    <div style={St.pane}>

      {/* ── SCHEDULE ── */}
      <div style={St.listHead}>
        <h2 style={St.h2}>Schedule</h2>
        {!readOnly&&<button style={St.smallBtn} onClick={()=>setAddEvt(true)}><Ic.plus style={ic(14)}/> Event</button>}
      </div>
      {events.length===0 && <Empty icon={Ic.cal} text="Add activities and events to build your day-by-day itinerary."/>}
      {tripDays.filter(d=>(byDay[d.v]||[]).length>0).map(d=>(
        <div key={d.v} style={{marginBottom:16}}>
          <div style={St.yearLabel}>
            <span style={{...St.yearNum,fontSize:12,letterSpacing:1}}>{d.l}</span>
            <span style={St.yearLine}/>
          </div>
          <div style={{display:"grid",gap:8}}>
            {(byDay[d.v]||[]).map(e=>(
              <div key={e.id} style={St.itemRow}>
                <div style={{...St.dayChip,minWidth:52,fontSize:11}}>{e.time||"—"}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={St.itemTitle}>{e.title}</div>
                  <div style={St.itemMeta}>{e.type}{e.notes?` · ${e.notes}`:""}</div>
                </div>
                {!readOnly&&<button style={St.iconBtn} onClick={()=>delEvent(e.id)} aria-label="Delete"><Ic.trash style={ic(15)}/></button>}
              </div>
            ))}
          </div>
        </div>
      ))}

      {/* ── MAP ── */}
      <div style={{...St.listHead,marginTop:events.length?20:0}}>
        <h2 style={St.h2}>Map</h2>
        {!readOnly&&<div style={{display:"flex",gap:8}}>
          <button style={St.smallBtn} onClick={()=>setPick(true)}><Ic.map style={ic(14)}/> Drop pin</button>
          <button style={St.smallBtn} onClick={()=>setOpenTrail(true)}><Ic.plus style={ic(14)}/> Trail</button>
        </div>}
      </div>
      <div ref={ref} style={{...St.mapBig,marginBottom:10}}/>
      {(trip.campLat&&trip.campLng)&&
        <a style={{...St.dirBtn,marginBottom:14,width:"100%",justifyContent:"center"}}
          href={directionsURL(trip.campLat,trip.campLng,trip.campLabel||trip.name)} target="_blank" rel="noreferrer">
          <Ic.nav style={ic(15)}/> Directions to campsite
        </a>}
      {trails.length===0&&<Empty icon={Ic.foot} text="Drop a pin or add a trail to map your routes."/>}
      <div style={{display:"grid",gap:10,marginBottom:24}}>
        {trails.map(t=>(
          <div key={t.id} style={St.itemRow}>
            <button style={{...St.checkBtn,...(t.done?St.checkOn:{})}} onClick={()=>!readOnly&&toggleTrail(t.id)} aria-label="Done">
              {t.done&&<Ic.check style={{width:13,height:13,color:"var(--night)"}}/>}
            </button>
            <div style={{flex:1}}>
              <div style={{...St.itemTitle,textDecoration:t.done?"line-through":"none",opacity:t.done?.6:1}}>{t.name}</div>
              <div style={St.itemMeta}>{(+t.miles||0).toFixed(1)} mi · {t.difficulty||"—"}{t.lat?` · ${(+t.lat).toFixed(4)}, ${(+t.lng).toFixed(4)}`:""}</div>
            </div>
            {t.lat&&t.lng&&
              <a style={St.navBtn} href={directionsURL(t.lat,t.lng,t.name)} target="_blank" rel="noreferrer" aria-label="Directions"><Ic.nav style={ic(14)}/></a>}
            {!readOnly&&<button style={St.iconBtn} onClick={()=>delTrail(t.id)} aria-label="Delete"><Ic.trash style={ic(15)}/></button>}
          </div>
        ))}
      </div>

      {/* ── PHOTOS ── */}
      <div style={St.listHead}>
        <h2 style={St.h2}>Photos</h2>
        {!readOnly&&<label style={{...St.smallBtn,cursor:"pointer"}}>
          <Ic.img style={ic(14)}/> Add
          <input type="file" accept="image/*" multiple style={{display:"none"}}
            onChange={e=>{addPhotos(e.target.files);e.target.value="";}}/>
        </label>}
      </div>
      {photos.length===0&&<Empty icon={Ic.img} text="Add photos from the trip to share with your crew."/>}
      {photos.length>0&&(
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5,marginBottom:16}}>
          {[...photos].reverse().map(p=>(
            <div key={p.id} style={{paddingBottom:"100%",position:"relative",borderRadius:10,overflow:"hidden",cursor:"pointer"}}
              onClick={()=>setViewPhoto(p)}>
              <img src={p.data} alt="" style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover"}}/>
            </div>
          ))}
        </div>
      )}

      {/* modals */}
      {addEvt&&!readOnly&&<FormSheet title="Add event" onClose={()=>setAddEvt(false)} onSave={addEvent}
        fields={[
          {k:"title",label:"Event",type:"text",req:true},
          {k:"day",label:"Day",type:"select",opts:tripDays,def:tripDays[0]?.v||""},
          {k:"time",label:"Time (e.g. 09:00)",type:"text"},
          {k:"type",label:"Type",type:"select",opts:eventTypes.map(t=>({v:t,l:t})),def:"Activity"},
          {k:"notes",label:"Notes (optional)",type:"text"},
        ]}/>}
      {openTrail&&!readOnly&&<FormSheet title={preset?"Name this pin":"Add trail"} onClose={()=>{setOpenTrail(false);setPreset(null);}} onSave={addTrail}
        initial={preset||{}}
        fields={[
          {k:"name",label:"Trail name",type:"text",req:true},
          {k:"miles",label:"Distance (mi)",type:"number"},
          {k:"difficulty",label:"Difficulty",type:"select",opts:["Easy","Moderate","Hard","Expert"].map(d=>({v:d,l:d})),def:"Moderate"},
          {k:"lat",label:"Latitude",type:"text"},
          {k:"lng",label:"Longitude",type:"text"},
        ]}/>}
      {pick&&!readOnly&&<PinPicker startLat={trip.campLat} startLng={trip.campLng} title="Drop a waypoint"
        onClose={()=>setPick(false)}
        onPick={(la,ln)=>{setPick(false);setPreset({lat:la.toFixed(6),lng:ln.toFixed(6)});setOpenTrail(true);}}/>}
      {viewPhoto&&(
        <div style={St.overlay} onClick={()=>setViewPhoto(null)}>
          <div style={{position:"relative",maxWidth:500,width:"100%",padding:"0 4px"}} onClick={e=>e.stopPropagation()}>
            <img src={viewPhoto.data} alt="" style={{width:"100%",borderRadius:14,display:"block"}}/>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 2px 0"}}>
              <span style={{fontSize:12,color:"var(--sage)"}}>by {getName(viewPhoto.by)}</span>
              {!readOnly&&<button style={St.dangerBtn} onClick={()=>delPhoto(viewPhoto.id)}><Ic.trash style={ic(14)}/> Remove</button>}
            </div>
            <button style={{position:"absolute",top:8,right:12,background:"rgba(0,0,0,.6)",border:"none",borderRadius:8,padding:"4px 6px",cursor:"pointer"}}
              onClick={()=>setViewPhoto(null)}><Ic.x style={{...ic(18),color:"var(--paper)"}}/></button>
          </div>
        </div>
      )}
    </div>
  );
}
