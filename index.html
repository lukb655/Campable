<script type="text/babel" data-presets="react-classic">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ============================================================
   DATA LAYER — Firebase if configured, else local-device demo.
   Same API surface either way so the UI never branches.
   ============================================================ */
const HAS_FB = !!(window.FIREBASE_CONFIG && window.FIREBASE_CONFIG.projectId);
let db = null, auth = null;
if (HAS_FB) {
  firebase.initializeApp(window.FIREBASE_CONFIG);
  db = firebase.firestore();
  auth = firebase.auth();
}

const uid = () => Math.random().toString(36).slice(2,10);
const code6 = () => {
  const a = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  return Array.from({length:6},()=>a[Math.floor(Math.random()*a.length)]).join("");
};

/* ---- LOCAL demo store (mirrors Firestore behaviour) ---- */
const LKEY = "traillog:trips:v2";
const LMEMBER = "traillog:me:v2";
function localReadAll(){ try{ return JSON.parse(localStorage.getItem(LKEY)||"{}"); }catch{ return {}; } }
function localWriteAll(o){ localStorage.setItem(LKEY, JSON.stringify(o)); }
const localSubs = new Set();
function localPing(){ localSubs.forEach(fn=>fn(localReadAll())); }

/* ---- unified API ---- */
const Data = {
  myId(){
    let m = localStorage.getItem(LMEMBER);
    if(!m){ m = uid(); localStorage.setItem(LMEMBER, m); }
    return m;
  },
  async ensureAuth(){
    if(!HAS_FB) return this.myId();
    return new Promise((res)=>{
      auth.onAuthStateChanged(u=>{ if(u) res(u.uid); });
      auth.signInAnonymously().catch(e=>console.error(e));
    });
  },
  // subscribe to all trips this device participates in
  subscribeTrips(myId, joinedCodes, cb){
    if(!HAS_FB){
      const fn = (all)=>{
        const list = Object.values(all).filter(t =>
          t.ownerId===myId || (joinedCodes||[]).includes(t.code));
        cb(list);
      };
      localSubs.add(fn); fn(localReadAll());
      return ()=>localSubs.delete(fn);
    }
    // Firestore: trips where member array contains myId
    return db.collection("trips").where("memberIds","array-contains",myId)
      .onSnapshot(snap=>{
        cb(snap.docs.map(d=>({id:d.id, ...d.data()})));
      }, err=>console.error(err));
  },
  async createTrip(trip){
    const full = { ...trip, code: code6(), createdAt: Date.now() };
    if(!HAS_FB){
      const all = localReadAll(); full.id = uid();
      all[full.id]=full; localWriteAll(all); localPing(); return full;
    }
    full.memberIds = [trip.ownerId];
    const ref = await db.collection("trips").add(full);
    return { id: ref.id, ...full };
  },
  async updateTrip(id, patch){
    if(!HAS_FB){
      const all = localReadAll(); if(all[id]){ all[id]={...all[id],...patch}; localWriteAll(all); localPing(); }
      return;
    }
    await db.collection("trips").doc(id).update(patch);
  },
  async deleteTrip(id){
    if(!HAS_FB){ const all=localReadAll(); delete all[id]; localWriteAll(all); localPing(); return; }
    await db.collection("trips").doc(id).delete();
  },
  // join a trip by code → returns trip or null
  async joinByCode(myId, myName, codeInput){
    const code = codeInput.trim().toUpperCase();
    if(!HAS_FB){
      const all = localReadAll();
      const t = Object.values(all).find(x=>x.code===code);
      if(!t) return null;
      t.members = t.members||[];
      if(!t.members.some(m=>m.id===myId)) t.members.push({id:myId,name:myName||"Guest"});
      all[t.id]=t; localWriteAll(all); localPing();
      return t;
    }
    const q = await db.collection("trips").where("code","==",code).limit(1).get();
    if(q.empty) return null;
    const doc = q.docs[0];
    const t = doc.data();
    const members = t.members||[];
    const memberIds = t.memberIds||[];
    if(!members.some(m=>m.id===myId)) members.push({id:myId,name:myName||"Guest"});
    if(!memberIds.includes(myId)) memberIds.push(myId);
    await doc.ref.update({members, memberIds});
    return {id:doc.id, ...t, members, memberIds};
  }
};

/* ============================================================
   SEED (local demo only, first run)
   ============================================================ */
function seedIfEmpty(myId, myName){
  if(HAS_FB) return;
  const all = localReadAll();
  if(Object.keys(all).length) return;
  const id = uid();
  all[id] = {
    id, ownerId: myId, code: code6(), createdAt: Date.now(),
    name:"Dolly Sods Overlander", location:"Dolly Sods Wilderness, WV",
    start:"2026-09-18", end:"2026-09-21", cover:"",
    notes:"Ridge camp, dark-sky photography, bring the 270 awning.",
    members:[{id:myId,name:myName||"You"},{id:uid(),name:"Sam"}],
    meals:[
      {id:uid(),day:"Fri",title:"Foil-pack steak & potatoes",cost:38,paidBy:myId,forAll:true},
      {id:uid(),day:"Sat",title:"Dutch-oven chili",cost:24,paidBy:"",forAll:true},
    ],
    trails:[
      {id:uid(),name:"Bear Rocks Loop",miles:4.2,difficulty:"Moderate",lat:39.0476,lng:-79.3074,done:false},
    ],
  };
  localWriteAll(all);
}

  cal:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>,
  chev:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>,
  back:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 19-7-7 7-7M19 12H5"/></svg>,
  check:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg>,
  nav:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 11 19-9-9 19-2-8-8-2z"/></svg>,
  dollar:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>,
  img:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.09-3.09a2 2 0 0 0-2.82 0L6 21"/></svg>,
  trash:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
  pack:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 10V6a4 4 0 0 1 8 0M8 6a4 4 0 0 1 8 0v4"/><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M9 14h6"/></svg>,
  share:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="m8.6 13.5 6.8 4M15.4 6.5l-6.8 4"/></svg>,
  copy:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>,
  map:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 3-6 3v15l6-3 6 3 6-3V3l-6 3-6-3zM9 3v15M15 6v15"/></svg>,
  edit:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>,
  cloud:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.5 19a4.5 4.5 0 0 0 0-9 6 6 0 0 0-11.5 1.5A4 4 0 0 0 6 19h11.5z"/></svg>,
  phone:(p)=><svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M12 18h.01"/></svg>,

/* ============================================================
   APP
   ============================================================ */
function App(){
  const [me, setMe] = useState({ id:null, name: localStorage.getItem("traillog:name")||"" });
  const [trips, setTrips] = useState(null);
  const [route, setRoute] = useState({name:"trips"});
  const [toast, setToast] = useState(null);
  const [joinedCodes, setJoinedCodes] = useState(()=>{
    try{ return JSON.parse(localStorage.getItem("traillog:joined")||"[]"); }catch{ return []; }
  });

  const flash = useCallback((m)=>{ setToast(m); setTimeout(()=>setToast(null),2400); },[]);

  // auth + initial subscribe
  useEffect(()=>{(async()=>{
    const id = await Data.ensureAuth();
    seedIfEmpty(id, me.name);
    setMe(m=>({...m,id}));
  })();},[]);

  useEffect(()=>{
    if(!me.id) return;
    const unsub = Data.subscribeTrips(me.id, joinedCodes, (list)=>{
      list.sort((a,b)=>(a.start||"9999").localeCompare(b.start||"9999"));
      setTrips(list);
    });
    return ()=>unsub&&unsub();
  },[me.id, joinedCodes]);

  const saveName = (n)=>{ setMe(m=>({...m,name:n})); localStorage.setItem("traillog:name",n); };

  const rememberCode = (code)=>{
    setJoinedCodes(prev=>{
      if(prev.includes(code)) return prev;
      const next=[...prev,code]; localStorage.setItem("traillog:joined",JSON.stringify(next)); return next;
    });
  };

  if(!me.id || trips===null) return <Splash/>;
  if(!me.name) return <NameGate onSet={saveName}/>;

  const current = route.name==="trip" ? trips.find(t=>t.id===route.id) : null;

  return (
    <div style={St.app}>
      <Contours/>
      <Header me={me} mode={HAS_FB?"live":"local"} onProfile={()=>setRoute({name:"me"})}/>
      <main style={St.main}>
        {route.name==="trips" &&
          <TripList trips={trips} me={me} flash={flash}
            onOpen={id=>setRoute({name:"trip",id})}
            onJoin={code=>rememberCode(code)} />}
        {route.name==="trip" && current &&
          <TripDetail trip={current} me={me} flash={flash}
            onBack={()=>setRoute({name:"trips"})} />}
        {route.name==="trip" && !current &&
          <div style={St.pane}><Empty icon={Ic.mtn} text="This trip is no longer available."/>
            <button style={St.primaryBtn} onClick={()=>setRoute({name:"trips"})}>Back to trips</button></div>}
        {route.name==="me" &&
          <Profile me={me} onName={saveName} mode={HAS_FB?"live":"local"} onBack={()=>setRoute({name:"trips"})}/>}
      </main>
      {toast && <div style={St.toast} className="fade"><Ic.check style={{width:15,height:15,color:"var(--gold)"}}/> {toast}</div>}
    </div>
  );
}
// inline styles use the string "var(--token)" directly

/* ============================================================
   HEADER / SPLASH / GATE
   ============================================================ */
function Header({me, mode, onProfile}){
  return (
    <header style={St.header}>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <div style={St.logoMark}><Ic.mtn style={{width:20,height:20,color:"var(--night)"}}/></div>
        <div>
          <div style={St.brand}>TRAIL<span style={{color:"var(--ember)"}}>LOG</span></div>
          <div style={St.tagline}>plan · pack · go together</div>
        </div>
      </div>
      <button style={St.profileBtn} onClick={onProfile}>
        <span style={{...St.modeDot, background: mode==="live"?"#5BBF8A":"var(--gold)"}}/>
        <span style={St.avatarSm}>{(me.name||"?").slice(0,1).toUpperCase()}</span>
      </button>
    </header>
  );
}
function Splash(){
  return <div style={{...St.app,display:"grid",placeItems:"center"}}>
    <Contours/>
    <div style={{textAlign:"center"}}>
      <Ic.mtn style={{width:40,height:40,color:"var(--ember)"}} className="spin"/>
      <div style={{...St.brand,marginTop:12}}>TRAIL<span style={{color:"var(--ember)"}}>LOG</span></div>
      <div style={St.tagline}>loading your trips…</div>
    </div>
  </div>;
}
function NameGate({onSet}){
  const [n,setN]=useState("");
  return <div style={{...St.app,display:"grid",placeItems:"center",padding:24}}>
    <Contours/>
    <div style={{...St.card2,maxWidth:380,width:"100%",textAlign:"center",padding:28}} className="fade">
      <div style={{...St.logoMark,margin:"0 auto 16px",width:52,height:52}}>
        <Ic.mtn style={{width:26,height:26,color:"var(--night)"}}/>
      </div>
      <h1 style={{...St.h1,fontSize:26}}>Welcome to TrailLog</h1>
      <p style={St.sub}>What should the crew call you? This name shows up next to the meals you cover and the trips you plan.</p>
      <input style={{...St.input,marginTop:16,textAlign:"center"}} placeholder="Your name"
        value={n} autoFocus onChange={e=>setN(e.target.value)}
        onKeyDown={e=>e.key==="Enter"&&n.trim()&&onSet(n.trim())}/>
      <button style={{...St.primaryBtn,width:"100%",justifyContent:"center",marginTop:14}}
        disabled={!n.trim()} onClick={()=>n.trim()&&onSet(n.trim())}>Start planning</button>
    </div>
  </div>;
}

/* ============================================================
   TRIP LIST
   ============================================================ */
function TripList({trips, me, flash, onOpen, onJoin}){
  const [adding,setAdding]=useState(false);
  const [joining,setJoining]=useState(false);

  const grouped = useMemo(()=>{
    const g={};
    trips.forEach(t=>{ const y=t.start?t.start.slice(0,4):"Unscheduled"; (g[y]=g[y]||[]).push(t); });
    return g;
  },[trips]);

  const addTrip = async (d)=>{
    await Data.createTrip({
      ownerId:me.id, name:d.name, location:d.location, start:d.start, end:d.end,
      cover:d.cover||"", notes:"",
      members:[{id:me.id,name:me.name}], meals:[], trails:[],
    });
    flash("Trip created");
    setAdding(false);
  };

  const join = async (codeInput)=>{
    const t = await Data.joinByCode(me.id, me.name, codeInput);
    if(!t){ flash("No trip with that code"); return false; }
    onJoin(t.code);
    flash(`Joined ${t.name}`);
    setJoining(false);
    return true;
  };

  return (
    <div className="fade">
      <div style={St.sectionHead}>
        <div>
          <h1 style={St.h1}>Your Expeditions</h1>
          <p style={St.sub}>{trips.length} {trips.length===1?"trip":"trips"} on the books</p>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button style={St.ghostBtn} onClick={()=>setJoining(true)}>Join</button>
          <button style={St.primaryBtn} onClick={()=>setAdding(true)}><Ic.plus style={ic(16)}/> New trip</button>
        </div>
      </div>

      {trips.length===0 &&
        <Empty icon={Ic.pack} text="No trips yet. Plan one and share its code, or join a friend's with their code."/>}

      {Object.keys(grouped).sort().map(year=>(
        <div key={year} style={{marginBottom:28}}>
          <div style={St.yearLabel}><span style={St.yearNum}>{year}</span><span style={St.yearLine}/></div>
          <div style={St.tripGrid}>
            {grouped[year].map(t=><TripCard key={t.id} trip={t} onOpen={()=>onOpen(t.id)}/>)}
          </div>
        </div>
      ))}

      {adding && <TripForm onSave={addTrip} onClose={()=>setAdding(false)}/>}
      {joining && <JoinForm onJoin={join} onClose={()=>setJoining(false)}/>}
    </div>
  );
}

function TripCard({trip,onOpen}){

function OverviewTab({trip, me, patch, flash, onBack}){
  const miles=(trip.trails||[]).reduce((a,t)=>a+(+t.miles||0),0);
  const cost=(trip.meals||[]).reduce((a,m)=>a+(+m.cost||0),0);
  const tasks=[
    ["Crew added",(trip.members||[]).length>=2],
    ["Meals planned",(trip.meals||[]).length>=1],
    ["Trails mapped",(trip.trails||[]).length>=1],
    ["Cover photo",!!trip.cover],
  ];
  const pct=Math.round(tasks.filter(t=>t[1]).length/tasks.length*100);
  const isOwner = trip.ownerId===me.id;

  const removeTrip = async ()=>{
    if(!confirm(isOwner ? "Delete this trip for everyone? This can't be undone." : "Leave this trip?")) return;
    await Data.deleteTrip(trip.id); // owner delete; (leave-only would need member removal — kept simple)
    flash(isOwner?"Trip deleted":"Left trip"); onBack();
  };

  return (
    <div style={St.pane}>
      <ShareCard trip={trip} flash={flash}/>

      <div style={St.statRow}>
        <Stat icon={Ic.foot} label="Total miles" value={miles.toFixed(1)}/>
        <Stat icon={Ic.food} label="Meals" value={(trip.meals||[]).length}/>
        <Stat icon={Ic.dollar} label="Food cost" value={`$${cost.toFixed(0)}`}/>
      </div>

      <div style={St.block}>
        <div style={St.blockHead}><span>Trip readiness</span><span style={{color:"var(--ember2)"}}>{pct}%</span></div>
        <div style={St.readyTrack}><div style={{...St.readyFill,width:`${pct}%`}}/></div>
        <div style={{marginTop:12,display:"grid",gap:8}}>
          {tasks.map(([label,ok])=>(
            <div key={label} style={St.taskRow}>
              <span style={{...St.taskDot,background:ok?"var(--ember)":"transparent",borderColor:ok?"var(--ember)":"var(--line)"}}>
                {ok && <Ic.check style={{width:11,height:11,color:"var(--night)"}}/>}
              </span>
              <span style={{color:ok?"var(--paper)":"var(--sage)"}}>{label}</span>
            </div>
          ))}
        </div>
      </div>

      <div style={St.block}>
        <div style={St.blockHead}><span>Field notes</span><Ic.edit style={{...ic(13),color:"var(--sage)"}}/></div>
        <textarea style={St.notes}
          placeholder="Gear list, permits, dark-sky windows, bailout plan…"
          defaultValue={trip.notes}
          onBlur={e=>patch({notes:e.target.value})}/>
        <div style={St.hintSm}>Saves when you tap away.</div>
      </div>

      <CoverEditor trip={trip} patch={patch} flash={flash}/>

      <button style={St.dangerBtn} onClick={removeTrip}>
        <Ic.trash style={ic(15)}/> {isOwner?"Delete trip":"Leave trip"}
      </button>
    </div>
  );
}

/* ---------------- MAP TAB (all pins) ---------------- */
function MapTab({trip}){
  const ref=useRef(null); const mapRef=useRef(null);
  const pins=(trip.trails||[]).filter(t=>t.lat&&t.lng);
  useEffect(()=>{
    if(!ref.current) return;
    const center = pins.length?[+pins[0].lat,+pins[0].lng]:[39.0476,-79.3074];
    const map=L.map(ref.current,{attributionControl:false}).setView(center, pins.length?11:9);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:18}).addTo(map);
    const group=[];
    pins.forEach(p=>{
      const mk=L.marker([+p.lat,+p.lng]).addTo(map)
        .bindPopup(`<b>${p.name}</b><br>${(+p.miles||0).toFixed(1)} mi · ${p.difficulty||""}`);
      group.push(mk.getLatLng());
    });
    if(group.length>1) map.fitBounds(L.latLngBounds(group).pad(0.3));
    mapRef.current=map;
    setTimeout(()=>map.invalidateSize(),120);
    return ()=>map.remove();
  },[trip.id]);
  return (
    <div style={St.pane}>
      <ListHead title="Trip map"/>
      {pins.length===0 && <Empty icon={Ic.map} text="No pinned waypoints yet. Add coordinates on the Trails tab and they'll appear here."/>}
      <div ref={ref} style={St.mapBig}/>
      {pins.length>0 && <div style={St.hintSm}>Showing {pins.length} {pins.length===1?"waypoint":"waypoints"}. Tap a marker for details.</div>}
    </div>
  );
}

/* ---------------- PIN PICKER ---------------- */
function PinPicker({trip,onPick,onClose}){
  const ref=useRef(null); const [sel,setSel]=useState(null);
  useEffect(()=>{
    if(!ref.current) return;
    const existing=(trip.trails||[]).filter(t=>t.lat&&t.lng);
    const center=existing.length?[+existing[0].lat,+existing[0].lng]:[39.0476,-79.3074];
    const map=L.map(ref.current,{attributionControl:false}).setView(center,11);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:18}).addTo(map);
    existing.forEach(p=>L.circleMarker([+p.lat,+p.lng],{radius:5,color:"#7FA99B",fillOpacity:.7}).addTo(map).bindPopup(p.name));
    let marker=null;
    map.on("click",e=>{
      setSel(e.latlng);
      if(marker) marker.setLatLng(e.latlng);
      else marker=L.marker(e.latlng).addTo(map);
    });
    setTimeout(()=>map.invalidateSize(),120);
    return ()=>map.remove();
  },[]);
  return (
    <Modal title="Drop a pin" onClose={onClose} wide>
      <p style={{...St.sub,marginTop:0}}>Tap the map where the trailhead or waypoint is. You can fine-tune the name and distance next.</p>
      <div ref={ref} style={St.mapPick}/>
      <div style={St.modalActions}>
        <button style={St.ghostBtn} onClick={onClose}>Cancel</button>
        <button style={St.primaryBtn} disabled={!sel} onClick={()=>sel&&onPick(sel.lat,sel.lng)}>
          <Ic.check style={ic(15)}/> Use this spot
        </button>
      </div>
    </Modal>
  );
}

/* ---------------- SPLIT ---------------- */
function SplitTab({trip}){
  const members=trip.members||[]; const meals=trip.meals||[];
  const tally=useMemo(()=>{
    const paid={},owes={};
    members.forEach(m=>{paid[m.id]=0;owes[m.id]=0;});
    meals.forEach(m=>{
      const c=+m.cost||0;
      if(m.paidBy&&paid[m.paidBy]!=null) paid[m.paidBy]+=c;
      const share=members.length?c/members.length:0;
      members.forEach(mem=>owes[mem.id]+=share);
    });
    return members.map(m=>({name:m.name,paid:paid[m.id],share:owes[m.id],net:paid[m.id]-owes[m.id]}));
  },[trip]);
  const total=meals.reduce((a,m)=>a+(+m.cost||0),0);
  if(members.length===0) return <div style={St.pane}><Empty icon={Ic.dollar} text="Add crew members to split costs."/></div>;
  return (
    <div style={St.pane}>
      <div style={St.block}>
        <div style={St.blockHead}><span>Shared food total</span><span style={{color:"var(--ember2)"}}>${total.toFixed(2)}</span></div>
        <div style={St.sub}>Split evenly across {members.length} {members.length===1?"person":"people"} · ${(total/members.length).toFixed(2)} each</div>
      </div>
      <div style={{display:"grid",gap:10}}>
        {tally.map(t=>(
          <div key={t.name} style={St.itemRow}>
            <div style={St.avatar}>{t.name.slice(0,1).toUpperCase()}</div>
            <div style={{flex:1}}>
              <div style={St.itemTitle}>{t.name}</div>
              <div style={St.itemMeta}>paid ${t.paid.toFixed(2)} · owes ${t.share.toFixed(2)}</div>
            </div>
            <div style={{...St.netPill,
              background:t.net>=0?"rgba(127,169,155,0.15)":"rgba(232,104,44,0.15)",
              color:t.net>=0?"var(--sage)":"var(--ember2)"}}>
              {t.net>=0?`gets back $${t.net.toFixed(2)}`:`owes $${Math.abs(t.net).toFixed(2)}`}
            </div>
          </div>
        ))}
      </div>
      <div style={St.hintSm}>“Paid by” on each meal feeds this. Whoever fronts cash gets paid back by the rest.</div>
    </div>
  );
}

        placeholder="https://…" onChange={e=>setF({...f,cover:e.target.value})}/></Field>
      <div style={St.modalActions}>
        <button style={St.ghostBtn} onClick={onClose}>Cancel</button>
        <button style={St.primaryBtn} disabled={!f.name.trim()} onClick={()=>f.name.trim()&&onSave(f)}>
          <Ic.check style={ic(15)}/> Create trip</button>
      </div>
    </Modal>
  );
}

function JoinForm({onJoin,onClose}){
  const [c,setC]=useState(""); const [err,setErr]=useState(false);
  const go=async()=>{ const ok=await onJoin(c); if(!ok) setErr(true); };
  return (
    <Modal title="Join a trip" onClose={onClose}>
      <p style={{...St.sub,marginTop:0}}>Enter the 6-character code from whoever planned the trip.</p>
      <input style={{...St.input,textAlign:"center",fontFamily:"'Oswald',sans-serif",fontSize:24,letterSpacing:6,textTransform:"uppercase"}}
        maxLength={6} autoFocus value={c} placeholder="ABC123"
        onChange={e=>{setC(e.target.value.toUpperCase());setErr(false);}}
        onKeyDown={e=>e.key==="Enter"&&go()}/>
      {err && <div style={St.errText}>No trip found with that code. Double-check it with your crew.</div>}
      <div style={St.modalActions}>
        <button style={St.ghostBtn} onClick={onClose}>Cancel</button>
        <button style={St.primaryBtn} disabled={c.length<6} onClick={go}>Join trip</button>
      </div>
    </Modal>
  );
}

function FormSheet({title,fields,onSave,onClose,initial={}}){
  const init={}; fields.forEach(f=>{ init[f.k]= initial[f.k]!=null?initial[f.k] : (f.def!=null?f.def:(f.type==="bool"?false:"")); });
  const [v,setV]=useState(init);
  const submit=()=>{ const bad=fields.find(f=>f.req&&!String(v[f.k]).trim()); if(bad)return; onSave(v); };
  return (
    <Modal title={title} onClose={onClose}>
      {fields.map(f=>(
        <Field key={f.k} label={f.label}>
          {(f.type==="text"||f.type==="number") &&
            <input style={St.input} type={f.type==="number"?"number":"text"} value={v[f.k]}
              onChange={e=>setV({...v,[f.k]:e.target.value})}/>}
          {f.type==="select" &&
            <select style={St.input} value={v[f.k]} onChange={e=>setV({...v,[f.k]:e.target.value})}>
              {f.allowEmpty && <option value="">—</option>}
              {f.opts.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
            </select>}
          {f.type==="bool" &&
            <button style={{...St.toggle,...(v[f.k]?St.toggleOn:{})}} onClick={()=>setV({...v,[f.k]:!v[f.k]})}>
              <span style={{...St.toggleKnob,...(v[f.k]?St.toggleKnobOn:{})}}/>{v[f.k]?"Yes":"No"}
            </button>}
        </Field>
      ))}
      <div style={St.modalActions}>
        <button style={St.ghostBtn} onClick={onClose}>Cancel</button>
        <button style={St.primaryBtn} onClick={submit}><Ic.check style={ic(15)}/> Save</button>
      </div>
    </Modal>
  );
}

function Modal({title,children,onClose,wide}){
  return <div style={St.overlay} onClick={onClose}>
    <div style={{...St.modal,...(wide?{maxWidth:560}:{})}} className="fade" onClick={e=>e.stopPropagation()}>
      <div style={St.modalHead}>
        <span style={St.modalTitle}>{title}</span>
        <button style={St.iconBtn} onClick={onClose} aria-label="Close"><Ic.x style={ic(18)}/></button>
      </div>
      {children}
    </div>
  </div>;
}
function Field({label,children}){
  return <div style={{flex:1,marginBottom:14}}><div style={St.fieldLabel}>{label}</div>{children}</div>;
}

function Contours(){
  return <svg style={St.contours} viewBox="0 0 400 800" preserveAspectRatio="xMidYMid slice" aria-hidden>
    {[0,1,2,3,4,5,6,7].map(i=>(
      <path key={i} fill="none" stroke="var(--sage)" strokeWidth="1"
        d={`M-20 ${80+i*95} C 80 ${40+i*95}, 160 ${140+i*95}, 240 ${70+i*95} S 380 ${30+i*95}, 440 ${100+i*95}`}/>
    ))}
  </svg>;
}
